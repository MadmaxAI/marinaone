<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina One</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#232f45;--border:#2a3a55;--accent:#3b82f6;--accent2:#6366f1;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* LAYOUT */
#app{display:flex;height:100vh}
#sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:.3s;flex-shrink:0;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}
/* SIDEBAR */
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:16px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text2);transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.2));color:var(--accent);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
/* TOPBAR */
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#d97706}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
/* KPI */
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:36px;opacity:.15}
.kpi.green::before{background:linear-gradient(90deg,var(--success),#34d399)}
.kpi.yellow::before{background:linear-gradient(90deg,var(--warning),#fcd34d)}
.kpi.red::before{background:linear-gradient(90deg,var(--danger),#f87171)}
.kpi.purple::before{background:linear-gradient(90deg,var(--accent2),#a78bfa)}
.kpi-active{box-shadow:0 0 0 2px var(--accent)!important;transform:translateY(-2px)}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(42,58,85,.5);color:var(--text2)}
tr:hover td{background:rgba(26,34,53,.5);color:var(--text)}
tr:last-child td{border-bottom:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.15);color:#34d399}
.badge-warning{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-danger{background:rgba(239,68,68,.15);color:#f87171}
.badge-info{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-purple{background:rgba(99,102,241,.15);color:#a78bfa}
.badge-gray{background:rgba(100,116,139,.15);color:#94a3b8}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-lg{max-width:800px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
/* FORMS */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.cols2{grid-template-columns:1fr 1fr}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--text3)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:72px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;box-shadow:var(--shadow)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--text3);font-size:13px;margin-top:4px}
.login-card .form-group{margin-bottom:16px}
.login-error{background:rgba(239,68,68,.15);border:1px solid var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}
/* QUEUE */
.queue-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:.15s}
.queue-card:hover{border-color:var(--accent);background:var(--surface3)}
.queue-priority{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.queue-priority.high{background:var(--warning);box-shadow:0 0 8px var(--warning)}
.queue-priority.normal{background:var(--text3)}
.queue-info{flex:1}
.queue-vessel{font-size:14px;font-weight:600;color:var(--text)}
.queue-detail{font-size:12px;color:var(--text3);margin-top:2px}
.queue-actions{display:flex;gap:6px}
/* PROGRESS BAR */
.progress-bar{background:var(--surface3);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .5s;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-fill.green{background:linear-gradient(90deg,var(--success),#34d399)}
.progress-fill.yellow{background:linear-gradient(90deg,var(--warning),#fcd34d)}
.progress-fill.red{background:linear-gradient(90deg,var(--danger),#f87171)}
/* SPOTS GRID */
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:8px}
.spot{border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;border:2px solid transparent}
.spot.available{background:rgba(16,185,129,.12);color:var(--success);border-color:rgba(16,185,129,.3)}
.spot.occupied{background:rgba(59,130,246,.12);color:var(--accent);border-color:rgba(59,130,246,.3)}
.spot.maintenance{background:rgba(245,158,11,.12);color:var(--warning);border-color:rgba(245,158,11,.3)}
.spot:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.3)}
/* ALERT ITEMS */
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border-left:3px solid transparent}
.alert-item.info{border-color:var(--accent)}
.alert-item.warning{border-color:var(--warning)}
.alert-item.error{border-color:var(--danger)}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-content{flex:1}
.alert-msg{font-size:13px;color:var(--text)}
.alert-meta{font-size:11px;color:var(--text3);margin-top:3px}
.alert-item .alert-content:hover{color:var(--text)}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:.15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.search-bar input{flex:1;max-width:320px}
/* TIER BADGES */
.tier-vip{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-weight:800;padding:2px 8px;border-radius:20px;font-size:11px}
.tier-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tier-silver{background:rgba(148,163,184,.2);color:#94a3b8;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tier-standard{background:rgba(100,116,139,.15);color:#64748b;padding:2px 8px;border-radius:20px;font-size:11px}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
/* STATUS DOTS */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:var(--success)}
.dot-yellow{background:var(--warning)}
.dot-red{background:var(--danger)}
.dot-blue{background:var(--accent)}
.dot-gray{background:var(--text3)}
/* PDV */
.pdv-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;height:calc(100vh - 160px)}
.pdv-items{overflow-y:auto}
.pdv-cart{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cart-total{padding:16px;border-top:1px solid var(--border);margin-top:auto}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.store-item-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
.store-item-card:hover{border-color:var(--accent);background:var(--surface3)}
.store-item-name{font-size:13px;font-weight:600;margin-bottom:4px}
.store-item-cat{font-size:10px;color:var(--text3);margin-bottom:8px}
.store-item-price{font-size:15px;font-weight:700;color:var(--success)}
.store-item-stock{font-size:11px;color:var(--text3)}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{position:fixed;z-index:100;left:-240px}.sidebar-open #sidebar{left:0}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
  .pdv-grid{grid-template-columns:1fr}
}
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.mt-1{margin-top:4px}.mb-2{margin-bottom:8px}.text-sm{font-size:13px}.text-xs{font-size:11px}.font-bold{font-weight:700}.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-warning{color:var(--warning)}.text-muted{color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
/* ── FINANCIAL TREE ─────────────────────────────────── */
.fin-year{margin-bottom:10px}
.fin-year-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:.15s;user-select:none}
.fin-year-header:hover{border-color:var(--accent);background:var(--surface2)}
.fin-year-title{font-size:16px;font-weight:700;color:var(--text);flex:1;display:flex;align-items:center;gap:8px}
.fin-expand{color:var(--text3);font-size:11px;width:14px;flex-shrink:0;transition:transform .2s}
.fin-year-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fin-stat{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.fin-stat.green{background:rgba(16,185,129,.15);color:#34d399}
.fin-stat.yellow{background:rgba(245,158,11,.15);color:#fbbf24}
.fin-stat.red{background:rgba(239,68,68,.15);color:#f87171}
.fin-stat.total{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.fin-year-body{padding:6px 0 4px 20px;border-left:2px solid var(--border);margin-left:16px;margin-top:4px}
.fin-month{margin-bottom:6px}
.fin-month-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface2);border-radius:10px;cursor:pointer;transition:.15s;user-select:none}
.fin-month-header:hover{background:var(--surface3)}
.fin-month-title{font-size:13px;font-weight:600;color:var(--text2);flex:1}
.fin-month-stats{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fin-status-tabs{display:flex;gap:0;background:var(--surface2);padding:4px;border-radius:10px;overflow-x:auto;flex-shrink:0}
.fin-status-tab{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.fin-status-tab:hover{color:var(--text)}
.fin-status-tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center}
.tab-count-all{background:rgba(59,130,246,.2);color:#60a5fa}
.tab-count-pending{background:rgba(245,158,11,.2);color:#fbbf24}
.tab-count-overdue{background:rgba(239,68,68,.2);color:#f87171}
.tab-count-paid{background:rgba(16,185,129,.2);color:#34d399}
.fin-month-amount{font-size:12px;font-weight:700;color:var(--text)}
.badge-orange{background:rgba(249,115,22,.15);color:#fb923c}
.delivery-flow{display:flex;flex-direction:column;gap:4px}
/* STORE PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.pipeline{grid-template-columns:1fr 1fr}}
.pipeline-col{background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);min-height:80px}
.pipeline-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;transition:.15s;cursor:default}
.pipeline-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.pipeline-card .pc-client{font-weight:600;font-size:13px;margin-bottom:3px;color:var(--text)}
.pipeline-card .pc-items{color:var(--text3);font-size:11px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipeline-card .pc-footer{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pipeline-card .pc-total{font-weight:700;color:var(--success);font-size:13px}
.pipeline-card .pc-time{font-size:10px;color:var(--text3)}
.pipeline-empty{text-align:center;padding:16px 8px;color:var(--text3);font-size:12px}
/* STORE GESTAO */
.gestao-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.gestao-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
/* EXCEL EXPORT */
.btn-export{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:600;transition:.15s}
.btn-export:hover{background:rgba(34,197,94,.22);border-color:#22c55e}
/* SETTINGS PAGE */
.settings-tab-bar{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.settings-tab{flex:1;padding:8px 12px;border-radius:7px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-align:center}
.settings-tab.active{background:var(--accent);color:#fff}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.settings-card-title{font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.settings-info-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
/* CLICKABLE TILES */
.kpi.clickable{cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
.kpi.clickable:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pipeline-card{cursor:pointer}
.pipeline-col-title{cursor:pointer;transition:.15s}
.pipeline-col-title:hover{color:var(--accent)}
tr.row-link{cursor:pointer}
tr.row-link:hover td{background:rgba(59,130,246,.08)!important;color:var(--text)!important}
.dash-spot-tile{cursor:pointer;transition:.15s}
.dash-spot-tile:hover{background:var(--surface3)!important;border-color:var(--accent)!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:48px;margin-bottom:8px">⚓</div>
      <h1>Marina One</h1>
      <p>Sistema de Gestão de Marina</p>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group"><label>E-mail</label><input id="login-email" type="email" value="admin@marina.com"></div>
    <div class="form-group"><label>Senha</label><input id="login-pass" type="password" value="marina123"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:11px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h1>⚓ Marina One</h1>
      <p>Gestão Integrada</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Principal</div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('mo_token') || '';
let currentUser = null;
let currentPage = 'dashboard';
let pageCharts = {};

// ── AUTH ──────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(API + path, {
    method, headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 401) { logout(); return; }
  return r.json();
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch(API+'/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error||'Erro ao entrar'; err.style.display='block'; return; }
    token = d.token;
    currentUser = d.user;
    localStorage.setItem('mo_token', token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('topbar-user').textContent = currentUser.name;
    nav('dashboard');
    setInterval(refreshBadges, 30000);
    refreshBadges();
  } catch(e) { err.textContent = 'Erro de conexão com o servidor'; err.style.display='block'; }
}

function logout() {
  localStorage.removeItem('mo_token');
  location.reload();
}

// Auto-login if token exists
async function tryAutoLogin() {
  if (!token) return;
  try {
    const r = await fetch(API+'/auth/me', {headers:{'Authorization':'Bearer '+token}});
    if (!r.ok) { localStorage.removeItem('mo_token'); return; }
    currentUser = await r.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('topbar-user').textContent = currentUser.name;
    nav('dashboard');
    setInterval(refreshBadges, 30000);
    refreshBadges();
  } catch(e) {}
}

async function refreshBadges() {
  const alerts = await api('GET', '/alerts?unread=1');
  const queue = await api('GET', '/queue');
  if (alerts) {
    const b = document.getElementById('alerts-badge');
    if (alerts.length > 0) { b.textContent = alerts.length; b.style.display=''; }
    else b.style.display='none';
  }
  if (queue) {
    const b = document.getElementById('queue-badge');
    if (queue.length > 0) { b.textContent = queue.length; b.style.display=''; }
    else b.style.display='none';
  }
}

// ── NAV ──────────────────────────────────────────────
const pageTitles = {dashboard:'Dashboard',queue:'Fila de Operações',clients:'Clientes',vessels:'Embarcações',spots:'Vagas',contracts:'Contratos',financial:'Financeiro',store:'Loja / PDV',maintenance:'Manutenção',analytics:'Analytics',alerts:'Alertas',settings:'Configurações'};

function nav(page) {

function refreshPage() { nav(currentPage); }

// ── HELPERS ──────────────────────────────────────────
const fmt = n => n == null ? '—' : new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n);
const fmtNum = n => n == null ? '—' : new Intl.NumberFormat('pt-BR').format(n);
const fmtDate = s => { if(!s) return '—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('pt-BR'); };
const fmtDT   = s => { if(!s) return '—'; return new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); };
const fmtTime = s => { if(!s) return '—'; return new Date(s).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); };
const tierBadge = t => {
  if(t==='vip') return '<span class="tier-vip">VIP</span>';
  if(t==='gold') return '<span class="tier-gold">GOLD</span>';
  if(t==='silver') return '<span class="tier-silver">SILVER</span>';
  return '<span class="tier-standard">STD</span>';
};
const statusBadge = (s, map) => {
  const m = {
    active:'badge-success',paid:'badge-success',completed:'badge-success',available:'badge-success',
    waiting:'badge-warning',in_progress:'badge-info',open:'badge-info',pending:'badge-warning',
    overdue:'badge-danger',cancelled:'badge-gray',maintenance:'badge-warning',occupied:'badge-info',
    ...(map||{})
  };
  const labels = {active:'Ativo',paid:'Pago',completed:'Concluído',available:'Disponível',waiting:'Aguardando',
    in_progress:'Em andamento',open:'Aberto',pending:'Pendente',overdue:'Vencido',cancelled:'Cancelado',
    maintenance:'Manutenção',occupied:'Ocupado'};
  return `<span class="badge ${m[s]||'badge-gray'}">${labels[s]||s}</span>`;
};
const priorityBadge = p => {
  const m={urgent:'badge-danger',high:'badge-warning',normal:'badge-info',low:'badge-gray'};
  const l={urgent:'Urgente',high:'Alta',normal:'Normal',low:'Baixa'};
  return `<span class="badge ${m[p]||'badge-gray'}">${l[p]||p}</span>`;
};
const opBadge = t => {
  const m={descida:'badge-info',subida:'badge-success',atracacao:'badge-purple'};
  const l={descida:'⬇ Descida',subida:'⬆ Subida',atracacao:'⚓ Atracação'};
  return `<span class="badge ${m[t]||'badge-gray'}">${l[t]||t}</span>`;

function setContent(html) { document.getElementById('content').innerHTML = html; }

function modal(html) {

}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-root').innerHTML = '';
}
function closeModalForce() { document.getElementById('modal-root').innerHTML = ''; }

async function toast(msg, type='success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--${type==='error'?'danger':type==='warn'?'warning':'success'});border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;box-shadow:var(--shadow);color:var(--text);max-width:320px`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── EXPORT TO EXCEL (CSV with BOM for UTF-8 in Excel) ────────────────
function exportCSV(rows, columns, filename) {
  if (!rows || !rows.length) { toast('Nenhum dado para exportar', 'error'); return; }
  const header = columns.map(c => `"${c.label}"`).join(';');
  const body = rows.map(row =>
    columns.map(c => {
      const v = typeof c.val === 'function' ? c.val(row) : (row[c.key] ?? '');
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(';')
  ).join('\n');
  const csv = '\uFEFF' + header + '\n' + body;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename + '.csv'; a.click();
  URL.revokeObjectURL(url);
  toast(`📥 Exportado: ${filename}.csv`);
}

  const data = await api('GET','/clients') || [];

}

function renderQueueHistoryTree(ops) {
  if (!ops.length) return '<div class="empty-state"><div class="icon">📋</div><p>Sem histórico de operações</p></div>';

  // Group by year → month → day
  const byYear = {};
  ops.forEach(op => {
    const d = new Date(op.completed_at || op.requested_at);
    const year  = d.getFullYear().toString();
    const month = String(d.getMonth()+1).padStart(2,'0');
    const day   = String(d.getDate()).padStart(2,'0');
    if (!byYear[year]) byYear[year] = {};
    if (!byYear[year][month]) byYear[year][month] = {};
    if (!byYear[year][month][day]) byYear[year][month][day] = [];
    byYear[year][month][day].push(op);
  });

  const curYear  = new Date().getFullYear().toString();
  const curMonth = String(new Date().getMonth()+1).padStart(2,'0');
  const curDay   = String(new Date().getDate()).padStart(2,'0');

  const opTypeLabel = { descida:'⬇ Descida', subida:'⬆ Subida', atracacao:'⚓ Atracação' };

  let html = '';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year => {
    const isCurYear = year === curYear;
    if (_qhExpandYears[year] === undefined) _qhExpandYears[year] = isCurYear;
    const exp = _qhExpandYears[year];

    const allOpsYear = Object.values(byYear[year]).flatMap(m => Object.values(m).flat());
    const total = allOpsYear.length;
    const completed = allOpsYear.filter(o=>o.status==='completed').length;
    const cancelled = allOpsYear.filter(o=>o.status==='cancelled').length;

    let monthsHtml = '';
    Object.keys(byYear[year]).sort((a,b)=>b-a).forEach(month => {
      const mKey = `${year}-${month}`;
      const isCurMonth = isCurYear && month === curMonth;
      if (_qhExpandMonths[mKey] === undefined) _qhExpandMonths[mKey] = isCurMonth;
      const mExp = _qhExpandMonths[mKey];

      const allOpsMonth = Object.values(byYear[year][month]).flat();
      const mTotal = allOpsMonth.length;
      const mCompleted = allOpsMonth.filter(o=>o.status==='completed').length;
      const mCancelled = allOpsMonth.filter(o=>o.status==='cancelled').length;

      let daysHtml = '';
      Object.keys(byYear[year][month]).sort((a,b)=>b-a).forEach(day => {
        const dKey = `${year}-${month}-${day}`;
        const isCurDay = isCurMonth && day === curDay;
        if (_qhExpandDays[dKey] === undefined) _qhExpandDays[dKey] = isCurDay;
        const dExp = _qhExpandDays[dKey];

        const dayOps = byYear[year][month][day];
        const dCompleted = dayOps.filter(o=>o.status==='completed').length;
        const dCancelled = dayOps.filter(o=>o.status==='cancelled').length;

        const dayCards = dayOps.map(op => {
          const borderColor = op.status==='completed' ? 'var(--success)' : op.status==='cancelled' ? 'var(--danger)' : 'var(--border)';
          const statusColor = op.status==='completed' ? 'var(--success)' : op.status==='cancelled' ? 'var(--danger)' : 'var(--text3)';
          return `
          <div class="queue-card" style="border-left:3px solid ${borderColor};margin-bottom:6px">
            <div style="flex:1;min-width:0">
              <div class="flex items-center gap-2 mb-1" style="flex-wrap:wrap">
                <span class="font-bold">${op.vessel_name||'—'}</span>
                ${tierBadge(op.client_tier)}
                ${VESSEL_SIZE_LABEL[op.vessel_size]?`<span style="font-size:11px;color:var(--text3)">${VESSEL_SIZE_LABEL[op.vessel_size]}</span>`:''}
                ${opBadge(op.operation_type)}
                <span style="font-size:11px;color:var(--text3)">${opTypeLabel[op.operation_type]||''}</span>
                ${statusBadge(op.status)}
              </div>
              <div class="text-xs text-muted">
                ${op.client_name||''} · Solicitado: ${fmtDT(op.requested_at)}
                ${op.started_at   ? ' · Iniciado: '+fmtDT(op.started_at)   : ''}
                ${op.completed_at ? ' · Concluído: '+fmtDT(op.completed_at) : ''}
                ${op.operator     ? ' · Op: '+op.operator : ''}
                ${op.notes        ? ' · '+op.notes : ''}
              </div>
            </div>
          </div>`;
        }).join('');

        daysHtml += `
        <div style="margin-bottom:6px">
          <div onclick="toggleQhDay('${dKey}')" style="display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--surface3);border-radius:8px;cursor:pointer;user-select:none;transition:.15s">
            <span class="fin-expand" id="qh-arrow-d-${dKey}">${dExp?'▼':'▶'}</span>
            <span style="font-size:13px;font-weight:600;color:var(--text);flex:1">📆 Dia ${day}/${month}/${year}</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${dCompleted?`<span class="fin-stat green">${dCompleted} concluída${dCompleted>1?'s':''}</span>`:''}
              ${dCancelled?`<span class="fin-stat red">${dCancelled} cancelada${dCancelled>1?'s':''}</span>`:''}
              <span class="fin-stat total">${dayOps.length} op${dayOps.length>1?'s':''}</span>
            </div>
          </div>
          <div id="qh-d-${dKey}" style="display:${dExp?'block':'none'};padding:6px 0 2px 16px;border-left:2px solid var(--border);margin-left:12px;margin-top:4px">
            ${dayCards}
          </div>
        </div>`;
      });

      monthsHtml += `
      <div class="fin-month">
        <div class="fin-month-header" onclick="toggleQhMonth('${mKey}')">
          <span class="fin-expand">${mExp?'▼':'▶'}</span>
          <span class="fin-month-title">📅 ${MONTH_PT[parseInt(month)]||month} ${year}</span>
          <div class="fin-month-stats">
            ${mCompleted?`<span class="fin-stat green">${mCompleted} concluída${mCompleted>1?'s':''}</span>`:''}
            ${mCancelled?`<span class="fin-stat red">${mCancelled} cancelada${mCancelled>1?'s':''}</span>`:''}
            <span class="fin-stat total">${mTotal} op${mTotal>1?'s':''}</span>
          </div>
        </div>
        <div id="qh-m-${mKey}" style="display:${mExp?'block':'none'};padding:6px 0 4px 20px;border-left:2px solid var(--border);margin-left:16px;margin-top:4px">
          ${daysHtml}
        </div>
      </div>`;
    });

    html += `
    <div class="fin-year">
      <div class="fin-year-header" onclick="toggleQhYear('${year}')">
        <span class="fin-expand">${exp?'▼':'▶'}</span>
        <span class="fin-year-title">${year}${isCurYear?' <span class="badge badge-info" style="font-size:10px;margin-left:6px">Ano Atual</span>':''}</span>
        <div class="fin-year-stats">
          ${completed?`<span class="fin-stat green">${completed} concluída${completed>1?'s':''}</span>`:''}
          ${cancelled?`<span class="fin-stat red">${cancelled} cancelada${cancelled>1?'s':''}</span>`:''}
          <span class="fin-stat total">${total} op${total>1?'s':''}</span>
        </div>
      </div>
      <div id="qh-y-${year}" class="fin-year-body" style="display:${exp?'block':'none'}">
        ${monthsHtml}
      </div>
    </div>`;
  });

  return html;
}

function toggleQhYear(year) {
  _qhExpandYears[year] = !_qhExpandYears[year];
  const body = document.getElementById(`qh-y-${year}`);
  const hdr  = body?.previousElementSibling;
  if (body) body.style.display = _qhExpandYears[year] ? 'block' : 'none';
  if (hdr)  hdr.querySelector('.fin-expand').textContent = _qhExpandYears[year] ? '▼' : '▶';
}
function toggleQhMonth(key) {
  _qhExpandMonths[key] = !_qhExpandMonths[key];
  const body = document.getElementById(`qh-m-${key}`);
  const hdr  = body?.previousElementSibling;
  if (body) body.style.display = _qhExpandMonths[key] ? 'block' : 'none';
  if (hdr)  hdr.querySelector('.fin-expand').textContent = _qhExpandMonths[key] ? '▼' : '▶';
}
function toggleQhDay(key) {
  _qhExpandDays[key] = !_qhExpandDays[key];
  const body = document.getElementById(`qh-d-${key}`);
  const arrow = document.getElementById(`qh-arrow-d-${key}`);
  if (body)  body.style.display  = _qhExpandDays[key] ? 'block' : 'none';
  if (arrow) arrow.textContent   = _qhExpandDays[key] ? '▼' : '▶';
}

const VESSEL_SIZE_LABEL = { pequena:'🚤 Pequena', media:'🛥️ Média', grande:'🛳️ Grande' };

function renderQueue(queue) {
  if (!queue.length) return '<div class="empty-state"><div class="icon">📋</div><p>Sem operações na fila</p></div>';
  const waitingOps = queue.filter(q => q.status === 'waiting');
  const opDirections = { descida:'⬇ terra → água', subida:'⬆ água → terra', atracacao:'⚓ Atracação' };
  return queue.map((q, idx) => {
    const inconsistent = q.is_inconsistent;
    const borderColor  = inconsistent ? 'var(--danger)' : (q.status==='in_progress' ? 'var(--success)' : q.priority ? 'var(--warning)' : 'var(--border)');
    const waitIdx      = waitingOps.indexOf(q);
    const isFirst      = waitIdx === 0;
    const isLast       = waitIdx === waitingOps.length - 1;
    const canReorder   = q.status === 'waiting' && !inconsistent;
    // Estimated time display
    let timeInfo = '';
    if (q.status === 'waiting' && q.estimated_start_at && q.estimated_end_at) {
      timeInfo = `<span style="font-size:11px;color:var(--text3);margin-left:4px">·&nbsp;⏰&nbsp;<strong>Início previsto:</strong>&nbsp;${fmtTime(q.estimated_start_at)}&nbsp;&nbsp;<strong>Término previsto:</strong>&nbsp;${fmtTime(q.estimated_end_at)}&nbsp;<span style="opacity:.7">(~${q.estimated_duration_min}min)</span></span>`;
    } else if (q.status === 'in_progress' && q.estimated_end_at) {
      timeInfo = `<span style="font-size:11px;color:var(--success);margin-left:4px">·&nbsp;⏳&nbsp;<strong>Início:</strong>&nbsp;${fmtTime(q.started_at)}&nbsp;&nbsp;<strong>Término previsto:</strong>&nbsp;${fmtTime(q.estimated_end_at)}&nbsp;<span style="opacity:.7">(~${q.estimated_duration_min}min)</span></span>`;
    }
    return `
  <div class="queue-card" id="qcard-${q.id}" style="border-left:3px solid ${borderColor}${inconsistent?';background:rgba(239,68,68,.05)':q.status==='in_progress'?';background:rgba(34,197,94,.04)':''}">
    <div style="flex:1;min-width:0">
      <div class="flex items-center gap-2 mb-1" style="flex-wrap:wrap">
        ${q.status==='waiting' && !inconsistent ? `<span style="font-size:11px;font-weight:700;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:12px;min-width:24px;text-align:center">#${waitIdx+1}</span>` : ''}
        <span class="font-bold">${q.vessel_name}</span>
        ${tierBadge(q.client_tier)}
        ${VESSEL_SIZE_LABEL[q.vessel_size] ? `<span style="font-size:11px;color:var(--text3)">${VESSEL_SIZE_LABEL[q.vessel_size]}</span>` : ''}
        ${opBadge(q.operation_type)}
        <span style="font-size:11px;color:var(--text3)">${opDirections[q.operation_type]||''}</span>
        ${statusBadge(q.status)}
        ${inconsistent ? `<span class="badge badge-danger" title="Operação inconsistente com o estado atual da embarcação">⚠ Inválida</span>` : ''}
      </div>
      <div class="flex items-center gap-2 mb-1" style="flex-wrap:wrap">
        ${VESSEL_STATUS_BADGE(q.vessel_status)}
        <span class="text-xs text-muted">${q.client_name} · ${q.vessel_type||''}${q.vessel_length?' '+q.vessel_length+'m':''}</span>
        ${timeInfo}
      </div>
      <div class="text-xs text-muted">
        Solicitado: ${fmtDT(q.requested_at)}
        ${q.started_at   ? ' · Iniciado: '+fmtDT(q.started_at)   : ''}
        ${q.completed_at ? ' · Concluído: '+fmtDT(q.completed_at) : ''}
        ${q.operator ? ' · Op: '+q.operator : ''}
        ${q.notes    ? ' · '+q.notes : ''}
        ${inconsistent ? ' · <span style="color:var(--danger);font-weight:600">Esta operação é inválida para o estado atual da embarcação — cancele-a.</span>' : ''}
      </div>
    </div>
    <div class="flex gap-2" style="flex-shrink:0;align-items:flex-start;flex-direction:column">
      <div class="flex gap-2">
        ${q.status==='waiting' && !inconsistent ? `<button class="btn btn-warning btn-sm" onclick="updateQueue(${q.id},'in_progress')">▶ Iniciar</button>` : ''}
        ${q.status==='in_progress' && !inconsistent ? `<button class="btn btn-success btn-sm" onclick="updateQueue(${q.id},'completed')">✓ Concluir</button>` : ''}
        ${!['completed','cancelled'].includes(q.status) ? `<button class="btn btn-danger btn-sm" onclick="cancelQueueOp(${q.id})" title="Cancelar operação">✕ Cancelar</button>` : ''}
      </div>
      ${canReorder ? `<div class="flex gap-1" style="align-self:flex-end">
        ${!isFirst  ? `<button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:13px" onclick="reorderQueueOp(${q.id},'up')"   title="Mover para cima na fila">↑</button>` : ''}
        ${!isLast   ? `<button class="btn btn-ghost btn-sm" style="padding:2px 8px;font-size:13px" onclick="reorderQueueOp(${q.id},'down')" title="Mover para baixo na fila">↓</button>` : ''}
      </div>` : ''}
    </div>
  </div>`;
  }).join('');
}

async function cancelQueueOp(id) {
  if (!confirm('Cancelar esta operação?')) return;
  await api('PUT', `/queue/${id}`, { status: 'cancelled' });
  toast('Operação cancelada');
  pages.queue();
}

function reorderQueueOp(id, direction) {
  const dirLabel = direction === 'up' ? 'Mover para Frente' : 'Mover para Trás';
  modal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">🔀 ${dirLabel} na Fila</div>
    <div class="settings-info-box" style="margin-bottom:12px">Uma justificativa é obrigatória. A ação será registrada no log do sistema com data, hora e usuário responsável.</div>
    <div class="form-group">
      <label>Justificativa *</label>
      <textarea id="reorder-just" rows="3" placeholder="Ex: Cliente VIP com urgência médica, operação de manutenção crítica..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitReorderQueue(${id},'${direction}')">✔ Confirmar Reordenação</button>
    </div>
  </div>`);
}

async function submitReorderQueue(id, direction) {
  const justification = document.getElementById('reorder-just')?.value?.trim();
  if (!justification) { toast('Justificativa obrigatória','error'); return; }
  const r = await api('PUT', `/queue/${id}/reorder`, { direction, justification });
  if (r && r.ok) {
    toast('Fila reordenada com sucesso');
    closeModalForce();
    pages.queue();
  } else if (r && r.error) {
    toast(r.error, 'error');
  }
}

async function renderQueueCalendar() {
  const now = new Date();
  const todayStr = now.toLocaleDateString('pt-BR', {weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  setContent(`
  <div class="flex justify-between mb-2">
    <div class="tabs">
      <div class="tab" onclick="switchQueueTab('active',this)">Fila Ativa</div>
      <div class="tab active" onclick="switchQueueTab('calendar',this)">📅 Calendário</div>
      <div class="tab" onclick="switchQueueTab('history',this)">Histórico</div>
    </div>
    <button class="btn btn-primary" onclick="openQueueModal()">+ Nova Operação</button>
  </div>
  <div id="cal-container"><div class="empty-state"><div class="icon">📅</div><p>Carregando calendário...</p></div></div>`);
  const cal = await api('GET','/queue/calendar');
  if (!cal) return;
  const container = document.getElementById('cal-container');
  if (!container) return;

  const opColors = { descida:'#3b82f6', subida:'#f59e0b', atracacao:'#8b5cf6', completed_descida:'#93c5fd', completed_subida:'#fcd34d', completed_atracacao:'#c4b5fd', cancelled:'#d1d5db' };
  const opLabel  = { descida:'⬇ Descida', subida:'⬆ Subida', atracacao:'⚓ Atracação' };
  const tierColors = { vip:'#f59e0b', gold:'#eab308', silver:'#94a3b8', standard:'#6b7280' };

  // Build unified timeline from done + active ops
  const allOps = [];
  for (const op of (cal.done||[])) {
    if (op.status === 'cancelled') continue; // skip cancelled in calendar
    const start = op.started_at   ? new Date(op.started_at)   : new Date(op.requested_at);
    const end   = op.completed_at ? new Date(op.completed_at) : new Date(start.getTime() + (op.estimated_duration_min||30)*60000);
    allOps.push({ ...op, _start: start, _end: end, _actual: true });
  }
  for (const op of (cal.active||[])) {
    if (op.is_inconsistent) continue;
    const start = op.status==='in_progress' && op.started_at ? new Date(op.started_at) : (op.estimated_start_at ? new Date(op.estimated_start_at) : new Date());
    const end   = op.estimated_end_at ? new Date(op.estimated_end_at) : new Date(start.getTime() + (op.estimated_duration_min||30)*60000);
    allOps.push({ ...op, _start: start, _end: end, _actual: op.status==='in_progress' });
  }
  allOps.sort((a,b) => a._start - b._start);

  if (!allOps.length) {
    container.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">📅</div>
      <div style="font-size:16px;color:var(--text2);font-weight:600">${todayStr}</div>
      <div style="color:var(--text3);margin-top:8px">Nenhuma operação agendada para hoje</div>
    </div>`;
    return;
  }

  // Determine timeline bounds
  const tStart = allOps[0]._start;
  const tEnd   = allOps[allOps.length-1]._end;
  const tRange = Math.max((tEnd - tStart)/60000, 60); // at least 60 min span

  // Build timeline bars
  const bars = allOps.map(op => {
    const offsetMin  = (op._start - tStart)/60000;
    const durationMin= Math.max((op._end - op._start)/60000, 5);
    const leftPct    = (offsetMin / tRange) * 100;
    const widthPct   = Math.max((durationMin / tRange) * 100, 3);
    const colorKey   = op.status==='completed' ? 'completed_'+op.operation_type : op.status==='cancelled' ? 'cancelled' : op.operation_type;
    const color      = opColors[colorKey] || '#6b7280';
    const textColor  = op.status==='completed'||op.status==='cancelled' ? '#374151' : '#fff';
    const opacity    = op.status==='cancelled' ? '0.5' : '1';
    const isNow      = op.status === 'in_progress';
    return `<div style="
        position:absolute;left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;
        background:${color};color:${textColor};opacity:${opacity};
        border-radius:6px;padding:6px 8px;font-size:11px;min-height:52px;
        box-shadow:${isNow?'0 0 0 2px var(--success),':''}0 1px 3px rgba(0,0,0,.15);
        cursor:default;overflow:hidden;
        ${isNow?'animation:pulse 2s infinite;':''}
      " title="${op.vessel_name} — ${opLabel[op.operation_type]||op.operation_type}\n${fmtTime(op._start.toISOString())} → ${fmtTime(op._end.toISOString())}\n${op.client_name}">
      <div style="font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${op.vessel_name}</div>
      <div style="opacity:.85;margin-top:2px">${opLabel[op.operation_type]||op.operation_type}</div>
      <div style="opacity:.75;margin-top:2px;font-size:10px">${fmtTime(op._start.toISOString())}–${fmtTime(op._end.toISOString())}</div>
      ${op.status==='in_progress'?'<div style="margin-top:2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">EM ANDAMENTO</div>':''}
    </div>`;
  }).join('');

  // Current time indicator
  const nowOffsetMin = (now - tStart)/60000;
  const nowPct = Math.max(0, Math.min(100, (nowOffsetMin/tRange)*100));
  const nowLine = nowOffsetMin >= 0 && nowOffsetMin <= tRange
    ? `<div style="position:absolute;left:${nowPct.toFixed(2)}%;top:0;bottom:0;width:2px;background:var(--danger);z-index:10">
         <div style="position:absolute;top:-20px;left:-16px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap">${fmtTime(now.toISOString())}</div>
       </div>` : '';

  // Hour tick marks
  const tickStart = new Date(tStart); tickStart.setSeconds(0,0); tickStart.setMinutes(Math.ceil(tickStart.getMinutes()/30)*30,0,0);
  let ticks = '';
  for (let t = new Date(tickStart); t <= tEnd; t.setMinutes(t.getMinutes()+30)) {
    const pct = ((t - tStart)/60000/tRange)*100;
    if (pct < 0 || pct > 100) continue;
    ticks += `<div style="position:absolute;left:${pct.toFixed(2)}%;top:0;bottom:0;border-left:1px dashed var(--border);z-index:0">
      <div style="position:absolute;top:-18px;left:2px;font-size:10px;color:var(--text3);white-space:nowrap">${fmtTime(t.toISOString())}</div>
    </div>`;
  }

  // Maneuver indicator legend
  const mvTime = cal.maneuver_time_min||0;

  // List table below timeline
  const tableRows = allOps.map(op => {
    const stBadge = op.status==='completed'?`<span class="badge badge-success">✓ Concluída</span>`:op.status==='in_progress'?`<span class="badge badge-warning">▶ Em andamento</span>`:op.status==='cancelled'?`<span class="badge badge-gray">Cancelada</span>`:`<span class="badge badge-info">Aguardando</span>`;
    return `<tr>
      <td style="white-space:nowrap;font-weight:600">${fmtTime(op._start.toISOString())}</td>
      <td style="white-space:nowrap">${fmtTime(op._end.toISOString())}</td>
      <td><strong>${op.vessel_name}</strong> <span style="font-size:11px;color:var(--text3)">${op.client_name}</span></td>
      <td>${opBadge(op.operation_type)}</td>
      <td>${VESSEL_SIZE_LABEL[op.vessel_size]||'—'}</td>
      <td>${stBadge}</td>
      <td style="font-size:11px;color:var(--text3)">~${Math.round((op._end-op._start)/60000)}min${op._actual?'':' (prev.)'}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
  <div class="card mb-2" style="padding:16px">
    <div class="flex justify-between items-center mb-3">
      <div>
        <div style="font-size:16px;font-weight:700;text-transform:capitalize">${todayStr}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${allOps.length} operação${allOps.length!==1?'s':''} · Tempo de manobra: ${mvTime}min entre operações</div>
      </div>
      <div class="flex gap-2">

async function filterQueue(type, el) {
  _queueTab = type;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  if (type === 'calendar') { await renderQueueCalendar(); return; }
  let data;
  if (type==='active') data = await api('GET','/queue');
  else data = await api('GET','/queue/history');
  document.getElementById('queue-list').innerHTML = renderQueue(data||[]);
}

async function updateQueue(id, status) {
  await api('PUT', `/queue/${id}`, {status});
  toast(`Operação ${status==='completed'?'concluída':status==='in_progress'?'iniciada':'cancelada'}`);
  pages.queue();
}

    </div>
  </div>`);
  // Do NOT auto-load vessels — wait for the user to select an op type
}

async function refreshQueueVessels() {
  const opType = document.getElementById('q-type')?.value;
  const sel    = document.getElementById('q-vessel');
  const hint   = document.getElementById('q-vessel-hint');
  if (!sel) return;
  // If no op type chosen yet, keep vessel select disabled
  if (!opType) {
    sel.innerHTML = '<option value="" disabled selected>— Selecione o tipo primeiro —</option>';
    sel.disabled = true;
    if (hint) hint.textContent = '';
    return;
  }
  sel.disabled = false;
  sel.innerHTML = '<option value="" disabled selected>Buscando...</option>';
  if (hint) hint.textContent = '';
  const vessels = await api('GET', `/vessels?eligible_for=${opType}`) || [];
  if (!vessels.length) {
    sel.innerHTML = '<option value="" disabled selected>Nenhuma embarcação elegível</option>';
    sel.disabled = true;
    const tips = {
      descida:  'Nenhuma embarcação em terra disponível para Descida (todas já estão na água ou com operação em andamento).',
      subida:   'Nenhuma embarcação na água disponível para Subida (nenhuma realizou Descida concluída ou há operação em andamento).',
      atracacao:'Nenhuma embarcação sem operação ativa no momento.',
    };
    if (hint) hint.innerHTML = `<span style="color:var(--warning)">⚠ ${tips[opType]||''}</span>`;
    return;
  }
  // First blank option forces explicit selection
  sel.innerHTML = `<option value="" disabled selected>— Selecione a embarcação —</option>` +
    vessels.map(v => `<option value="${v.id}">${v.name} — ${v.client_name} · ${v.vessel_status||''}</option>`).join('');
  if (hint) hint.innerHTML = `<span style="color:var(--success)">✓ ${vessels.length} embarcação${vessels.length>1?'s':''} elegível${vessels.length>1?'s':''}</span>`;
}

async function submitQueue() {
  const operation_type = document.getElementById('q-type').value;
  const vessel_id      = document.getElementById('q-vessel').value;
  const notes          = document.getElementById('q-notes').value;
  if (!operation_type) { toast('Selecione o tipo de operação', 'error'); return; }
  if (!vessel_id)      { toast('Selecione a embarcação', 'error'); return; }
  const r = await api('POST','/queue',{vessel_id:parseInt(vessel_id),operation_type,notes});
  if (r && r.id) {
    closeModalForce();
    pages.queue();
    if (r.warning) toast(r.warning, 'warn');
    else toast('Operação adicionada à fila');
  } else if (r && r.error) toast(r.error, 'error');
}

let _allCharges      = [];
let _finStatusFilter = '';
let _finExpandYears  = {};
let _finExpandMonths = {};
const MONTH_PT = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

pages.financial = async () => {

    overdue: _allCharges.filter(c=>c.status==='overdue').reduce((s,c)=>s+c.amount,0),

  };

  </div>

  <div id="fin-tree"></div>`);

  renderFinTree();

function calcFinTotals(arr) {
  return {
    paid:    arr.filter(c=>c.status==='paid').reduce((s,c)=>s+c.amount,0),
    pending: arr.filter(c=>c.status==='pending').reduce((s,c)=>s+c.amount,0),
    overdue: arr.filter(c=>c.status==='overdue').reduce((s,c)=>s+c.amount,0),
    total:   arr.reduce((s,c)=>s+c.amount,0),
    count:   arr.length
  };
}

function renderFinTree() {
  const filtered = _finStatusFilter ? _allCharges.filter(c=>c.status===_finStatusFilter) : _allCharges;

  // Group: year → month → charges
  const byYear = {};
  filtered.forEach(c => {
    const d = c.due_date || '';
    const y = d.slice(0,4) || '?';
    const m = d.slice(5,7) || '?';
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][m]) byYear[y][m] = [];
    byYear[y][m].push(c);
  });

  const curYear = new Date().getFullYear().toString();
  const years   = Object.keys(byYear).sort((a,b)=>Number(b)-Number(a));

  if (!years.length) {
    document.getElementById('fin-tree').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhuma cobrança encontrada para este filtro</p></div>';
    return;
  }

  let html = '';
  years.forEach(year => {
    const isCur   = year === curYear;
    const exp     = _finExpandYears[year] !== false && (isCur || !!_finExpandYears[year]);
    const allArr  = Object.values(byYear[year]).flat();
    const yt      = calcFinTotals(allArr);

    let stats = '';
    if (yt.paid    > 0) stats += `<span class="fin-stat green">💰 ${fmt(yt.paid)}</span>`;
    if (yt.pending > 0) stats += `<span class="fin-stat yellow">🕐 ${fmt(yt.pending)}</span>`;
    if (yt.overdue > 0) stats += `<span class="fin-stat red">🔴 ${fmt(yt.overdue)}</span>`;
    stats += `<span class="fin-stat total">${yt.count} cobranças · ${fmt(yt.total)}</span>`;

    html += `
    <div class="fin-year">
      <div class="fin-year-header" onclick="toggleFinYear('${year}')">
        <span class="fin-expand">${exp?'▼':'▶'}</span>
        <span class="fin-year-title">${year}${isCur?' <span class="badge badge-info" style="font-size:10px;margin-left:6px">Ano Atual</span>':''}</span>
        <div class="fin-year-stats">${stats}</div>
      </div>
      <div id="fin-y-${year}" class="fin-year-body" style="display:${exp?'block':'none'}">
        ${renderFinMonths(byYear[year], year)}
      </div>
    </div>`;
  });

  document.getElementById('fin-tree').innerHTML = html;
}

function renderFinMonths(monthsObj, year) {
  const months   = Object.keys(monthsObj).sort((a,b)=>Number(b)-Number(a));
  const curYear  = new Date().getFullYear().toString();
  const curMonth = String(new Date().getMonth()+1).padStart(2,'0');
  let html = '';

  months.forEach(month => {
    const key = `${year}-${month}`;
    const arr = monthsObj[month];
    const exp = _finExpandMonths[key] !== false && (year===curYear && month===curMonth || !!_finExpandMonths[key]);
    const mt  = calcFinTotals(arr);

    let mStats = `<span style="font-size:11px;color:var(--text3)">${mt.count} cobranças</span>`;
    if (mt.paid    > 0) mStats += `<span class="badge badge-success" style="font-size:11px">${fmt(mt.paid)}</span>`;
    if (mt.pending > 0) mStats += `<span class="badge badge-warning" style="font-size:11px">${fmt(mt.pending)}</span>`;
    if (mt.overdue > 0) mStats += `<span class="badge badge-danger"  style="font-size:11px">${fmt(mt.overdue)}</span>`;

    html += `
    <div class="fin-month">
      <div class="fin-month-header" onclick="toggleFinMonth('${key}')">
        <span class="fin-expand">${exp?'▼':'▶'}</span>
        <span class="fin-month-title">📅 ${MONTH_PT[parseInt(month)]||month} ${year}</span>
        <div class="fin-month-stats">${mStats}</div>
      </div>
      <div id="fin-m-${key}" style="display:${exp?'block':'none'}">
        <div class="card" style="margin-top:6px;padding:0;overflow:hidden">
          <div class="table-wrap"><table>
            <thead><tr><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Pagamento</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>${renderChargeRows(arr)}</tbody>
          </table></div>
        </div>
      </div>
    </div>`;
  });

  return html;
}

function renderChargeRows(charges) {
  if (!charges||!charges.length) return '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">Sem cobranças</td></tr>';

async function markPaid(id) {
  const charge = (_allCharges || []).find(c => c.id === id) || {};
  modal(`<div class="modal modal-lg" onclick="event.stopPropagation()">
    <div class="modal-title">✅ Registrar Pagamento</div>
    <div class="settings-info-box" style="margin-bottom:16px">
      <strong>${charge.client_name || '—'}</strong> · ${charge.description || '—'} · <strong style="color:var(--success)">${fmt(charge.amount || 0)}</strong>
    </div>
    <div class="form-row cols2">
      <div class="form-group">
        <label>Forma de Pagamento *</label>
        <select id="pay-method">
          <option value="pix">PIX</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="cartao">Cartão</option>
          <option value="transferencia">Transferência</option>
          <option value="boleto">Boleto</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data do Pagamento</label>
        <input type="date" id="pay-date" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>
    <div class="form-group">
      <label>Descrição / Observações *</label>
      <textarea id="pay-notes" rows="2" placeholder="Ex: Mensalidade abril/2026 — PIX recebido às 14h..." style="resize:vertical"></textarea>
    </div>
    <div class="form-group">
      <label>Comprovante (imagem ou PDF) *</label>
      <input type="file" id="pay-comprovante" accept="image/*,.pdf" style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);width:100%">
      <div id="pay-preview" style="margin-top:8px"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancelar</button>
      <button class="btn btn-success" id="btn-confirm-pay" onclick="confirmMarkPaid(${id})">✅ Confirmar Pagamento</button>
    </div>
  </div>`);
  document.getElementById('pay-comprovante').addEventListener('change', function() {
    const file = this.files[0]; if (!file) return;
    const prev = document.getElementById('pay-preview');
    if (file.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = e => { prev.innerHTML = `<img src="${e.target.result}" style="max-height:120px;border-radius:6px;border:1px solid var(--border)">`; };
      r.readAsDataURL(file);
    } else {
      prev.innerHTML = `<span style="font-size:12px;color:var(--text2)">📎 ${file.name} (${(file.size/1024).toFixed(1)} KB)</span>`;
    }
  });
}

async function confirmMarkPaid(id) {
  const method    = document.getElementById('pay-method')?.value;
  const payDate   = document.getElementById('pay-date')?.value;
  const notes     = document.getElementById('pay-notes')?.value?.trim();
  const fileInput = document.getElementById('pay-comprovante');
  const file      = fileInput?.files?.[0];
  if (!notes) { toast('Descrição é obrigatória','error'); return; }
  if (!file)  { toast('Comprovante é obrigatório','error'); return; }
  const b64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const btn = document.getElementById('btn-confirm-pay');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Salvando...'; }
  const r = await api('PUT', `/financial/charges/${id}`, {
    status: 'paid', payment_method: method, paid_date: payDate,
    pay_notes: notes, comprovante_data: b64, comprovante_name: file.name,
  });
  if (r && r.ok) {
    toast('✅ Pagamento registrado com comprovante!');
    closeModalForce();
    _allCharges = await api('GET','/financial/charges') || [];
    renderFinTree();
  } else {
    toast('Erro ao registrar pagamento','error');
    if (btn) { btn.disabled = false; btn.textContent = '✅ Confirmar Pagamento'; }
  }
}

function addToCart(id, name, price, stock) {
  const existing = cart.find(i=>i.item_id===id);
  if (existing) {
    if (existing.qty < stock) existing.qty++;
    else { toast('Estoque insuficiente','error'); return; }
  } else {
    cart.push({item_id:id,name,price,qty:1});
  }
  renderCartItems();
}

function renderCartItems() {
  const el = document.getElementById('cart-items');
  const total = document.getElementById('cart-total-val');
  if (!el) return;
  if (!cart.length) { el.innerHTML = '<div class="empty-state" style="padding:30px"><div class="icon">🛒</div><p>Carrinho vazio</p></div>'; }
  else {
    el.innerHTML = cart.map((item,i)=>`
    <div class="cart-item">
      <div style="flex:1"><div class="font-bold text-sm">${item.name}</div><div class="text-xs text-muted">${fmt(item.price)} × ${item.qty}</div></div>
      <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-sm" onclick="cartQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button class="btn btn-ghost btn-sm" onclick="cartQty(${i},1)">+</button>
        <span class="text-success font-bold" style="min-width:70px;text-align:right">${fmt(item.price*item.qty)}</span>
      </div>
    </div>`).join('');
  }
  const t = cart.reduce((s,i)=>s+i.price*i.qty,0);
  if (total) total.textContent = fmt(t);
}

function cartQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx,1);
  renderCartItems();
}

async function finalizeSale() {
  if (!cart.length) { toast('Carrinho vazio','error'); return; }
  const payment = document.getElementById('pdv-payment').value;
  const client_id = document.getElementById('pdv-client').value;
  const vessel_id = document.getElementById('pdv-vessel').value;
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  if (payment==='pix') {
    const pix = await api('POST','/store/pix-qrcode',{amount:total});
    const pixPayload = (pix && pix.payload) ? pix.payload : '';
    const qrImgUrl = pixPayload ? `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pixPayload)}` : '';
    modal(`<div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">💳 Pagamento PIX — ${fmt(total)}</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px">
        <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px" onclick="closeModalForce();confirmSale()">💳 Cobrar Aqui (PIX)</button>
        <button class="btn btn-success" style="width:100%;padding:12px;font-size:14px" onclick="closeModalForce();sendWhatsApp(${JSON.stringify(pixPayload)},${JSON.stringify(qrImgUrl)})">📲 Enviar via WhatsApp</button>
      </div>
      <div style="text-align:center">
        ${qrImgUrl?`<img src="${qrImgUrl}" style="border-radius:8px;max-width:160px;margin-bottom:10px" onerror="this.style.display='none'">`:'' }
        <div style="background:var(--surface2);border-radius:8px;padding:10px;word-break:break-all;font-family:monospace;font-size:10px;color:var(--text2)">${pixPayload||'PIX não configurado'}</div>
        ${pix && pix.txid?`<div style="margin-top:8px;font-size:11px;color:var(--text3)">TXID: ${pix.txid}</div>`:''}
      </div>
      <div class="form-actions"><button class="btn btn-ghost" onclick="closeModalForce()">Cancelar</button></div>
    </div>`);
    return;
  }
  await confirmSale();
}

async function sendWhatsApp(pixPayload, qrImgUrl) {
  const client_id = document.getElementById('pdv-client')?.value;
  const vessel_id = document.getElementById('pdv-vessel')?.value;
  const payment = 'pix';
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  // Create order with pending_payment status
  const r = await api('POST','/store/orders',{items:cart,client_id:client_id?parseInt(client_id):null,vessel_id:vessel_id?parseInt(vessel_id):null,payment_method:payment,status:'pending_payment'});
  if (!r || !r.id) { toast('Erro ao criar pedido','error'); return; }
  // Load configured store WhatsApp + client phone
  const [clients, sett] = await Promise.all([
    api('GET','/clients'),
    api('GET','/settings'),
  ]);
  const storeWpp = (sett && sett.store_whatsapp) ? sett.store_whatsapp.replace(/\D/g,'') : '';
  let phone = '';
  if (client_id) {
    const cl = (clients||[]).find(c=>String(c.id)===String(client_id));
    if (cl && cl.phone) phone = cl.phone.replace(/\D/g,'');
  }
  // Build WhatsApp message using configurable template
  const marinaName = (sett && sett.marina_name) ? sett.marina_name : 'Marina One';
  const pixKey = (sett && sett.bank_pix_key) ? sett.bank_pix_key : pixPayload;
  const itemsList = cart.map(i=>`• ${i.name} x${i.qty} = ${fmt(i.price*i.qty)}`).join('\n');
  // Get vessel/client names for template
  const cl = client_id ? (clients||[]).find(c=>String(c.id)===String(client_id)) : null;
  const vessels = await api('GET','/vessels');
  const ves = vessel_id ? (vessels||[]).find(v=>String(v.id)===String(vessel_id)) : null;
  const template = (sett && sett.store_whatsapp_template) ? sett.store_whatsapp_template : '{marina} — Pedido #{id}\n\n{itens}\n\nTotal: {total}\n\nPIX: {pix_key}\n{qrcode_link}';
  let msg = template
    .replace('{cliente}', cl?.name || 'Cliente')
    .replace('{marina}', marinaName)
    .replace('{embarcacao}', ves?.name || '—')
    .replace('{itens}', itemsList)
    .replace('{total}', fmt(total))
    .replace('{pix_key}', pixKey)
    .replace('{qrcode_link}', qrImgUrl || '')
    .replace('{id}', r.id);
  // Append PIX payload if not already in message
  if (!msg.includes(pixPayload) && pixPayload) msg += `\n\nCódigo PIX (copia e cola):\n${pixPayload}`;
  // Use client phone if available, otherwise store WhatsApp as sender
  const targetPhone = phone || storeWpp;
  const waUrl = targetPhone
    ? `https://wa.me/${targetPhone}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(waUrl,'_blank');
  toast(`📲 Pedido #${r.id} criado! WhatsApp aberto${phone?' para o cliente':' — copie e envie ao cliente'}.`);
  cart=[]; pages.store();
}

async function confirmSale() {
  const payment = document.getElementById('pdv-payment')?.value || 'dinheiro';
  const client_id = document.getElementById('pdv-client')?.value;
  const vessel_id = document.getElementById('pdv-vessel')?.value;
  // Pagamento no balcão = já pago → entra direto em Em Preparo
  const r = await api('POST','/store/orders',{
    items: cart,
    client_id: client_id ? parseInt(client_id) : null,
    vessel_id:  vessel_id  ? parseInt(vessel_id)  : null,
    payment_method: payment,
    status: 'paid',
    delivery_status: 'preparando'
  });
  if (r && r.id) { toast(`Venda finalizada — Em Preparo! Total: ${fmt(r.total)}`); cart=[]; pages.store(); }
}

// Retorna o estágio unificado de um pedido como string interna
function orderStage(o) {
  if (o.status === 'pending_payment')  return 'aguardando';
  if (o.status === 'paid') {
    if (o.delivery_status === 'entregue')  return 'entregue';
    if (o.delivery_status === 'entregando') return 'entregando';
    return 'preparando'; // null, 'preparando' ou qualquer outro paid
  }
  return 'aguardando'; // fallback
}

// Badge visual por estágio
function orderStageBadge(stage) {
  const map = {
    aguardando: `<span class="badge badge-warning">⏳ Aguard. Pagamento</span>`,
    preparando: `<span class="badge badge-purple">🍳 Em Preparo</span>`,
    entregando: `<span class="badge badge-orange">🛵 Em Entrega</span>`,
    entregue:   `<span class="badge badge-success">✅ Entregue</span>`,
  };
  return map[stage] || `<span class="badge badge-gray">${stage}</span>`;
}

async function renderOrders(stageFilter) {
  stageFilter = stageFilter || window._ordersFilter || 'todos';
  window._ordersFilter = stageFilter;

  // Busca todos os pedidos (filtramos client-side pelo estágio unificado)
  const allOrders = await api('GET', '/store/orders') || [];

  const filtered = stageFilter === 'todos' ? allOrders : allOrders.filter(o => orderStage(o) === stageFilter);

  // Contagens por estágio
  const cnt = {
    todos:      allOrders.length,
    aguardando: allOrders.filter(o=>orderStage(o)==='aguardando').length,
    preparando: allOrders.filter(o=>orderStage(o)==='preparando').length,
    entregando: allOrders.filter(o=>orderStage(o)==='entregando').length,
    entregue:   allOrders.filter(o=>orderStage(o)==='entregue').length,
  };

  const tabDef = [
    ['todos',      'Todos',              'tab-count-all'],
    ['aguardando', '⏳ Aguard. Pgto',   'tab-count-pending'],
    ['preparando', '🍳 Em Preparo',     'tab-count-pending'],
    ['entregando', '🛵 Em Entrega',     'tab-count-all'],
    ['entregue',   '✅ Entregue',       'tab-count-paid'],
  ];
  const filterTabs = tabDef.map(([v,l,cc])=>`
    <button class="fin-status-tab${stageFilter===v?' active':''}" onclick="renderOrders('${v}')">
      ${l} <span class="tab-count ${cc}">${cnt[v]}</span>
    </button>`).join('');

  function deliveryCell(o) {
    const stage = orderStage(o);
    if (stage === 'aguardando') {
      return `<div class="delivery-flow">
        ${orderStageBadge('aguardando')}
        <button class="btn btn-success btn-sm" onclick="orderDelivery(${o.id},{status:'paid',delivery_status:'preparando'})">✅ Confirmar Pagamento</button>
      </div>`;
    }
    if (stage === 'preparando') {
      return `<div class="delivery-flow">
        ${orderStageBadge('preparando')}
        <button class="btn btn-primary btn-sm" onclick="orderDelivery(${o.id},{delivery_status:'entregando'})">🚀 Saiu p/ Entrega</button>
      </div>`;
    }
    if (stage === 'entregando') {
      return `<div class="delivery-flow">
        ${orderStageBadge('entregando')}
        <button class="btn btn-success btn-sm" onclick="orderDelivery(${o.id},{delivery_status:'entregue'})">✅ Confirmar Entrega</button>
      </div>`;
    }
    if (stage === 'entregue') {
      return orderStageBadge('entregue');
    }
    return orderStageBadge(stage);
  }

  document.getElementById('store-content').innerHTML = `
  <div class="flex justify-between mb-2" style="align-items:center;flex-wrap:wrap;gap:8px">
    <div class="fin-status-tabs">${filterTabs}</div>
    <button class="btn btn-ghost btn-sm" onclick="renderOrders(window._ordersFilter)">↻ Atualizar</button>
  </div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr>
      <th>Data</th><th>Cliente</th><th>Embarcação</th><th>Itens</th>
      <th>Total</th><th>Pgto</th><th>Etapa / Ação</th>
    </tr></thead>
    <tbody>${filtered.map(o=>`<tr>
      <td>${fmtDT(o.created_at)}</td>
      <td>${o.client_name||'<span class="text-muted">Balcão</span>'}</td>
      <td>${o.vessel_name||'—'}</td>
      <td style="max-width:220px;white-space:normal;font-size:12px">${Array.isArray(o.items)?o.items.map(i=>`${i.name}×${i.qty}`).join(', '):o.items}</td>
      <td class="text-success font-bold">${fmt(o.total)}</td>
      <td>${o.payment_method?`<span class="badge badge-gray">${o.payment_method}</span>`:'—'}</td>
      <td>${deliveryCell(o)}</td>
    </tr>`).join('')||`<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:32px">Nenhum pedido nesta etapa</td></tr>`}
    </tbody>
  </table></div></div>`;
}

      </div>
    </div>
    <div class="form-group"><label>Observações</label><textarea id="mm-notes">${m.notes||''}</textarea></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMaintenance(${id||'null'})">Salvar OS</button>

  </div>`);
}

async function saveMaintenance(id) {
  const body = {vessel_id:document.getElementById('mm-vessel').value?parseInt(document.getElementById('mm-vessel').value):null,type:document.getElementById('mm-type').value,description:document.getElementById('mm-desc').value,priority:document.getElementById('mm-priority').value,scheduled_date:document.getElementById('mm-date').value||null,technician:document.getElementById('mm-tech').value,estimated_hours:parseFloat(document.getElementById('mm-hours').value)||null,cost:parseFloat(document.getElementById('mm-cost').value)||0,status:document.getElementById('mm-status').value,notes:document.getElementById('mm-notes').value};
  if (!body.description) { toast('Descrição obrigatória','error'); return; }
  if (id) await api('PUT',`/maintenance/${id}`,body); else await api('POST','/maintenance',body);
  toast('OS salva!'); closeModalForce(); pages.maintenance();
}

function navigateFromAlert(entityType, id) {

  else toast('Não há página associada a este alerta','error');
}

let _alertsFilter = 'all';
pages.alerts = async () => { renderAlertsPage(_alertsFilter); };

async function renderAlertsPage(filter) {
  _alertsFilter = filter || 'all';
  const allAlerts = await api('GET','/alerts') || [];

  const unread  = allAlerts.filter(a => !a.read_at);
  const bySev   = { info: 0, warning: 0, error: 0 };
  allAlerts.forEach(a => { bySev[a.severity] = (bySev[a.severity]||0) + 1; });

  // Type breakdown
  const byType = {};
  allAlerts.forEach(a => { byType[a.type] = (byType[a.type]||0) + 1; });
  const topTypes = Object.entries(byType).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Filter
  const SEVERITY_FILTERS = ['unread','read','warning','error','info','all'];
  let filtered = allAlerts;
  if (_alertsFilter === 'unread')        filtered = allAlerts.filter(a => !a.read_at);
  else if (_alertsFilter === 'read')     filtered = allAlerts.filter(a => !!a.read_at);
  else if (_alertsFilter === 'warning')  filtered = allAlerts.filter(a => a.severity==='warning');
  else if (_alertsFilter === 'error')    filtered = allAlerts.filter(a => a.severity==='error');
  else if (_alertsFilter === 'info')     filtered = allAlerts.filter(a => a.severity==='info');
  else if (_alertsFilter !== 'all')      filtered = allAlerts.filter(a => a.type === _alertsFilter);

  // Unified clickable KPI-filter cards (no separate tabs bar)
  const kpiCards = [
    { v:'all',     label:'Todos',       count:allAlerts.length,   sub:`${unread.length} não lidos`,   icon:'🔔', color:'' },
    { v:'unread',  label:'Não Lidos',   count:unread.length,       sub:'Aguardando revisão',            icon:'🔴', color:unread.length>0?'yellow':'' },
    { v:'error',   label:'Críticos',    count:bySev.error,         sub:'Alta prioridade',               icon:'🚨', color:bySev.error>0?'red':'' },
    { v:'warning', label:'Atenção',     count:bySev.warning,       sub:'Requerem ação',                 icon:'⚠️', color:bySev.warning>0?'yellow':'' },
    { v:'info',    label:'Informativos',count:bySev.info||0,        sub:'Apenas informação',             icon:'ℹ️', color:'' },
    { v:'read',    label:'Lidos',       count:allAlerts.length - unread.length, sub:'Arquivados', icon:'✓', color:'green' },
  ];

  setContent(`
  <div class="grid g3 mb-2" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
    ${kpiCards.map(c=>`
    <div class="kpi ${c.color} ${_alertsFilter===c.v?'kpi-active':''}" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onclick="renderAlertsPage('${c.v}')" title="Filtrar: ${c.label}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.count}</div>
      <div class="kpi-sub">${c.sub}</div>
      <span class="kpi-icon">${c.icon}</span>
    </div>`).join('')}
  </div>

  ${topTypes.length ? `
  <div class="card mb-2" style="padding:10px 16px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase">Filtrar por tipo:</span>
      ${topTypes.map(([t,c])=>`<span onclick="renderAlertsPage('${t}')" style="cursor:pointer;background:${_alertsFilter===t?'var(--accent)':'var(--surface2)'};color:${_alertsFilter===t?'#fff':'inherit'};border:1px solid ${_alertsFilter===t?'var(--accent)':'var(--border)'};border-radius:20px;padding:3px 10px;font-size:12px;transition:background .15s" title="Filtrar por tipo: ${t}"><strong>${c}</strong> ${t}</span>`).join('')}
      ${!['all','unread','read','warning','error','info'].includes(_alertsFilter)?`<span onclick="renderAlertsPage('all')" style="cursor:pointer;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text3)">✕ limpar</span>`:''}
    </div>
  </div>` : ''}

  <div class="flex justify-between items-center mb-2">
    <div style="font-size:12px;color:var(--text3)">${filtered.length} alerta${filtered.length!==1?'s':''} · <strong style="color:var(--text)">${kpiCards.find(c=>c.v===_alertsFilter)?.label||'Tipo: '+_alertsFilter}</strong></div>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">✓ Marcar todos como lidos</button>
  </div>
  <div id="alerts-list">${renderAlerts(filtered)}</div>`);
}

function renderAlerts(alerts) {
  if (!alerts.length) return '<div class="empty-state"><div class="icon">🔔</div><p>Nenhum alerta nesta categoria</p></div>';
  const sevIcon = { info:'ℹ️', warning:'⚠️', error:'🚨' };
  return alerts.map(a => {
    const hasNav = ALERT_NAV[a.entity_type?.toLowerCase()];
    return `
  <div class="alert-item ${a.severity}" style="${a.read_at?'opacity:.6':''}">
    <div class="alert-icon">${sevIcon[a.severity]||'🔔'}</div>
    <div class="alert-content" style="flex:1;${hasNav?'cursor:pointer':''}" ${hasNav?`onclick="markRead(${a.id},false);navigateFromAlert('${a.entity_type}',${a.entity_id||'null'})" title="Clique para ir ao registro"`:''}>
      <div class="alert-msg">${a.message}${hasNav?` <span style="font-size:11px;color:var(--accent)">→ ver</span>`:''}${a.read_at?'':' <span style="width:8px;height:8px;background:var(--danger);border-radius:50%;display:inline-block;margin-left:4px"></span>'}</div>
      <div class="alert-meta">${fmtDT(a.created_at)} · <strong>${a.type}</strong>${a.entity_type?' · '+a.entity_type:''}${a.read_at?` · <span style="color:var(--text3)">Lido ${fmtDT(a.read_at)}</span>`:''}</div>
    </div>
    <div class="flex gap-1" style="flex-shrink:0">
      ${!a.read_at
        ? `<button class="btn btn-ghost btn-sm" onclick="markRead(${a.id},true)" title="Marcar como lido">✓ Lido</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="markUnread(${a.id})" title="Marcar como não lido" style="opacity:.7">↩ Não lido</button>`}
    </div>
  </div>`;
  }).join('');
}

async function markRead(id, refresh=true) {
  await api('PUT',`/alerts/${id}/read`);
  refreshBadges();
  if (refresh) renderAlertsPage(_alertsFilter);
}

async function markUnread(id) {
  await api('PUT',`/alerts/${id}/unread`);
  toast('Alerta marcado como não lido');
  refreshBadges();
  renderAlertsPage(_alertsFilter);
}

async function markAllRead() {
  await api('PUT','/alerts/read-all');
  toast('Todos os alertas marcados como lidos');
  refreshBadges();
  renderAlertsPage(_alertsFilter);
}
