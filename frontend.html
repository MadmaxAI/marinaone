        <div class="form-group">
          <label>🌅 Início das Operações</label>
          <input type="time" id="s-ops_start_time" value="${s.ops_start_time||'07:00'}">
        </div>
        <div class="form-group">
          <label>🌙 Término das Operações</label>
          <input type="time" id="s-ops_end_time" value="${s.ops_end_time||'18:00'}">
        </div>
      </div>
      <div class="form-actions" style="border-top:none;padding-top:0;margin-top:16px">
        <button class="btn btn-primary" onclick="saveSettings(${JSON.stringify(allKeys)})">💾 Salvar Configurações de Tempo</button>
      </div>
    </div>`;

  } else if (_settingsTab === 'logs') {
    const logs = await api('GET','/system-logs?limit=200') || [];
    const actionLabels = { queue_reorder: '🔀 Reordenação de Fila' };
    const logsHtml = logs.length ? logs.map(l => {
      let details = '';
      try {
        const d = JSON.parse(l.details||'{}');
        if (l.action === 'queue_reorder') {
          details = `Embarcação <strong>${d.vessel||''}</strong> movida ${d.direction==='up'?'para frente':'para trás'} (posição ${d.moved_from}→${d.moved_to} de ${d.total}). Justificativa: <em>"${d.justification}"</em>`;
        } else {
          details = l.details || '';
        }
      } catch(e) { details = l.details || ''; }
      return `<tr>
        <td style="white-space:nowrap">${fmtDT(l.created_at)}</td>
        <td>${l.user_name||'—'}</td>
        <td>${actionLabels[l.action]||l.action}</td>
        <td style="font-size:12px">${details}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px">Nenhum log registrado</td></tr>';
    content = `
    <div class="settings-card">
      <div class="settings-card-title">📋 Logs do Sistema</div>
      <div class="settings-info-box">Registro de ações administrativas: reordenações de fila e outras operações com justificativa.</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th><th>Detalhes</th></tr></thead>
        <tbody>${logsHtml}</tbody>
      </table></div>
    </div>`;

  } else if (_settingsTab === 'licenca') {
    const valid = s.license_valid_until || '—';
    const expired = valid !== '—' && new Date(valid) < new Date();
    content = `
    <div class="settings-card">
      <div class="settings-card-title">🔑 Licença Marina One</div>
      <div class="grid g3" style="gap:12px;margin-bottom:20px">
        <div class="settings-info-box" style="margin-bottom:0;text-align:center">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">Plano</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);text-transform:capitalize">${s.license_plan||'standard'}</div>
        </div>
        <div class="settings-info-box" style="margin-bottom:0;text-align:center">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">Válido Até</div>
          <div style="font-size:18px;font-weight:700;color:${expired?'var(--danger)':'var(--success)'}">${valid}</div>
        </div>
        <div class="settings-info-box" style="margin-bottom:0;text-align:center">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">ID da Marina</div>
          <div style="font-size:14px;font-weight:700;color:var(--text);font-family:monospace">${s.license_marina_id||'—'}</div>
        </div>
      </div>
      ${expired?'<div style="background:rgba(239,68,68,.1);border:1px solid var(--danger);border-radius:8px;padding:12px;font-size:12px;color:var(--danger);margin-bottom:16px">⚠️ Licença expirada. Entre em contato para renovação.</div>':''}
      <div class="settings-info-box">
        <strong>Marina One SaaS</strong> — Sistema de Gestão Integrada de Marina<br>
        Versão: <strong>1.0.0</strong> · Node.js + SQLite · Licença individual por marina<br><br>
        📧 Suporte: <a href="mailto:suporte@marinaone.com" style="color:var(--accent)">suporte@marinaone.com</a><br>
        🌐 Site: <a href="https://marinaone.com.br" target="_blank" style="color:var(--accent)">marinaone.com.br</a>
      </div>
    </div>`;
  }

  setContent(`
    <div style="max-width:740px">
      <div class="settings-tab-bar">${tabBar}</div>
      ${content}
    </div>`);
}

// ── INIT ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModalForce();
});
tryAutoLogin();
</script>
</body>
</html>
