<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marina One</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#232f45;--border:#2a3a55;--accent:#3b82f6;--accent2:#6366f1;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
/* LAYOUT */
#app{display:flex;height:100vh}
#sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:.3s;flex-shrink:0;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}
/* SIDEBAR */
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:16px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--text2);transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.2));color:var(--accent);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
/* TOPBAR */
.topbar-title{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:#d97706}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
/* KPI */
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:36px;opacity:.15}
.kpi.green::before{background:linear-gradient(90deg,var(--success),#34d399)}
.kpi.yellow::before{background:linear-gradient(90deg,var(--warning),#fcd34d)}
.kpi.red::before{background:linear-gradient(90deg,var(--danger),#f87171)}
.kpi.purple::before{background:linear-gradient(90deg,var(--accent2),#a78bfa)}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius)}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(42,58,85,.5);color:var(--text2)}
tr:hover td{background:rgba(26,34,53,.5);color:var(--text)}
tr:last-child td{border-bottom:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:rgba(16,185,129,.15);color:#34d399}
.badge-warning{background:rgba(245,158,11,.15);color:#fbbf24}
.badge-danger{background:rgba(239,68,68,.15);color:#f87171}
.badge-info{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-purple{background:rgba(99,102,241,.15);color:#a78bfa}
.badge-gray{background:rgba(100,116,139,.15);color:#94a3b8}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-lg{max-width:800px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
/* FORMS */
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.cols2{grid-template-columns:1fr 1fr}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:var(--text3)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:72px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;box-shadow:var(--shadow)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--text3);font-size:13px;margin-top:4px}
.login-card .form-group{margin-bottom:16px}
.login-error{background:rgba(239,68,68,.15);border:1px solid var(--danger);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}
/* QUEUE */
.queue-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:.15s}
.queue-card:hover{border-color:var(--accent);background:var(--surface3)}
.queue-priority{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.queue-priority.high{background:var(--warning);box-shadow:0 0 8px var(--warning)}
.queue-priority.normal{background:var(--text3)}
.queue-info{flex:1}
.queue-vessel{font-size:14px;font-weight:600;color:var(--text)}
.queue-detail{font-size:12px;color:var(--text3);margin-top:2px}
.queue-actions{display:flex;gap:6px}
/* PROGRESS BAR */
.progress-bar{background:var(--surface3);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;transition:width .5s;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.progress-fill.green{background:linear-gradient(90deg,var(--success),#34d399)}
.progress-fill.yellow{background:linear-gradient(90deg,var(--warning),#fcd34d)}
.progress-fill.red{background:linear-gradient(90deg,var(--danger),#f87171)}
/* SPOTS GRID */
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:8px}
.spot{border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;border:2px solid transparent}
.spot.available{background:rgba(16,185,129,.12);color:var(--success);border-color:rgba(16,185,129,.3)}
.spot.occupied{background:rgba(59,130,246,.12);color:var(--accent);border-color:rgba(59,130,246,.3)}
.spot.maintenance{background:rgba(245,158,11,.12);color:var(--warning);border-color:rgba(245,158,11,.3)}
.spot:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(0,0,0,.3)}
/* ALERT ITEMS */
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border-left:3px solid transparent}
.alert-item.info{border-color:var(--accent)}
.alert-item.warning{border-color:var(--warning)}
.alert-item.error{border-color:var(--danger)}
.alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-content{flex:1}
.alert-msg{font-size:13px;color:var(--text)}
.alert-meta{font-size:11px;color:var(--text3);margin-top:3px}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:.15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.search-bar input{flex:1;max-width:320px}
/* TIER BADGES */
.tier-vip{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-weight:800;padding:2px 8px;border-radius:20px;font-size:11px}
.tier-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.tier-silver{background:rgba(148,163,184,.2);color:#94a3b8;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tier-standard{background:rgba(100,116,139,.15);color:#64748b;padding:2px 8px;border-radius:20px;font-size:11px}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px}
/* STATUS DOTS */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-green{background:var(--success)}
.dot-yellow{background:var(--warning)}
.dot-red{background:var(--danger)}
.dot-blue{background:var(--accent)}
.dot-gray{background:var(--text3)}
/* PDV */
.pdv-grid{display:grid;grid-template-columns:1fr 360px;gap:16px;height:calc(100vh - 160px)}
.pdv-items{overflow-y:auto}
.pdv-cart{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.cart-total{padding:16px;border-top:1px solid var(--border);margin-top:auto}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.store-item-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
.store-item-card:hover{border-color:var(--accent);background:var(--surface3)}
.store-item-name{font-size:13px;font-weight:600;margin-bottom:4px}
.store-item-cat{font-size:10px;color:var(--text3);margin-bottom:8px}
.store-item-price{font-size:15px;font-weight:700;color:var(--success)}
.store-item-stock{font-size:11px;color:var(--text3)}
/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{position:fixed;z-index:100;left:-240px}.sidebar-open #sidebar{left:0}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
  .pdv-grid{grid-template-columns:1fr}
}
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.mt-1{margin-top:4px}.mb-2{margin-bottom:8px}.text-sm{font-size:13px}.text-xs{font-size:11px}.font-bold{font-weight:700}.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-warning{color:var(--warning)}.text-muted{color:var(--text3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
/* ── FINANCIAL TREE ─────────────────────────────────── */
.fin-year{margin-bottom:10px}
.fin-year-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:.15s;user-select:none}
.fin-year-header:hover{border-color:var(--accent);background:var(--surface2)}
.fin-year-title{font-size:16px;font-weight:700;color:var(--text);flex:1;display:flex;align-items:center;gap:8px}
.fin-expand{color:var(--text3);font-size:11px;width:14px;flex-shrink:0;transition:transform .2s}
.fin-year-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fin-stat{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.fin-stat.green{background:rgba(16,185,129,.15);color:#34d399}
.fin-stat.yellow{background:rgba(245,158,11,.15);color:#fbbf24}
.fin-stat.red{background:rgba(239,68,68,.15);color:#f87171}
.fin-stat.total{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.fin-year-body{padding:6px 0 4px 20px;border-left:2px solid var(--border);margin-left:16px;margin-top:4px}
.fin-month{margin-bottom:6px}
.fin-month-header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface2);border-radius:10px;cursor:pointer;transition:.15s;user-select:none}
.fin-month-header:hover{background:var(--surface3)}
.fin-month-title{font-size:13px;font-weight:600;color:var(--text2);flex:1}
.fin-month-stats{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fin-status-tabs{display:flex;gap:0;background:var(--surface2);padding:4px;border-radius:10px;overflow-x:auto;flex-shrink:0}
.fin-status-tab{padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.fin-status-tab:hover{color:var(--text)}
.fin-status-tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center}
.tab-count-all{background:rgba(59,130,246,.2);color:#60a5fa}
.tab-count-pending{background:rgba(245,158,11,.2);color:#fbbf24}
.tab-count-overdue{background:rgba(239,68,68,.2);color:#f87171}
.tab-count-paid{background:rgba(16,185,129,.2);color:#34d399}
.fin-month-amount{font-size:12px;font-weight:700;color:var(--text)}
.badge-orange{background:rgba(249,115,22,.15);color:#fb923c}
.delivery-flow{display:flex;flex-direction:column;gap:4px}
/* STORE PIPELINE */
.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.pipeline{grid-template-columns:1fr 1fr}}
.pipeline-col{background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);min-height:80px}
.pipeline-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;transition:.15s;cursor:default}
.pipeline-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.pipeline-card .pc-client{font-weight:600;font-size:13px;margin-bottom:3px;color:var(--text)}
.pipeline-card .pc-items{color:var(--text3);font-size:11px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipeline-card .pc-footer{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pipeline-card .pc-total{font-weight:700;color:var(--success);font-size:13px}
.pipeline-card .pc-time{font-size:10px;color:var(--text3)}
.pipeline-empty{text-align:center;padding:16px 8px;color:var(--text3);font-size:12px}
/* STORE GESTAO */
.gestao-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.gestao-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
/* CLICKABLE TILES */
.kpi.clickable{cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
.kpi.clickable:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pipeline-card{cursor:pointer}
.pipeline-col-title{cursor:pointer;transition:.15s}
.pipeline-col-title:hover{color:var(--accent)}
tr.row-link{cursor:pointer}
tr.row-link:hover td{background:rgba(59,130,246,.08)!important;color:var(--text)!important}
.dash-spot-tile{cursor:pointer;transition:.15s}
.dash-spot-tile:hover{background:var(--surface3)!important;border-color:var(--accent)!important}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:48px;margin-bottom:8px">⚓</div>
      <h1>Marina One</h1>
      <p>Sistema de Gestão de Marina</p>
    </div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group"><label>E-mail</label><input id="login-email" type="email" value="admin@marina.com"></div>
    <div class="form-group"><label>Senha</label><input id="login-pass" type="password" value="marina123"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:11px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <h1>⚓ Marina One</h1>
      <p>Gestão Integrada</p>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="nav('dashboard')" data-page="dashboard"><span class="icon">🏠</span>Dashboard</button>
      <button class="nav-item" onclick="nav('queue')" data-page="queue"><span class="icon">📋</span>Fila de Operações<span class="nav-badge" id="queue-badge" style="display:none"></span></button>
      <div class="nav-section">Gestão</div>
      <button class="nav-item" onclick="nav('clients')" data-page="clients"><span class="icon">👤</span>Clientes</button>
      <button class="nav-item" onclick="nav('vessels')" data-page="vessels"><span class="icon">🛥️</span>Embarcações</button>
      <button class="nav-item" onclick="nav('spots')" data-page="spots"><span class="icon">🅿️</span>Vagas</button>
      <button class="nav-item" onclick="nav('contracts')" data-page="contracts"><span class="icon">📄</span>Contratos</button>
      <div class="nav-section">Operações</div>
      <button class="nav-item" onclick="nav('financial')" data-page="financial"><span class="icon">💰</span>Financeiro</button>
      <button class="nav-item" onclick="nav('store')" data-page="store"><span class="icon">🏪</span>Loja / PDV</button>
      <button class="nav-item" onclick="nav('maintenance')" data-page="maintenance"><span class="icon">🔧</span>Manutenção</button>
      <div class="nav-section">Análise</div>
      <button class="nav-item" onclick="nav('analytics')" data-page="analytics"><span class="icon">📊</span>Analytics</button>
      <button class="nav-item" onclick="nav('alerts')" data-page="alerts"><span class="icon">🔔</span>Alertas<span class="nav-badge" id="alerts-badge" style="display:none"></span></button>
    </div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('app').classList.toggle('sidebar-open')">☰</button>
        <span class="topbar-title" id="page-title">Dashboard</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" onclick="refreshPage()">↻ Atualizar</button>
        <span id="topbar-user" style="font-size:13px;color:var(--text3)"></span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODALS -->
<div id="modal-root"></div>

<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('mo_token') || '';
let currentUser = null;
let currentPage = 'dashboard';
let pageCharts = {};

// ── AUTH ──────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(API + path, {
    method, headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
    body: body ? JSON.stringify(body) : undefined
  });
  if (r.status === 401) { logout(); return; }
  return r.json();
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch(API+'/auth/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d = await r.json();
    if (!r.ok) { err.textContent = d.error||'Erro ao entrar'; err.style.display='block'; return; }
    token = d.token;
    currentUser = d.user;
    localStorage.setItem('mo_token', token);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('topbar-user').textContent = currentUser.name;
    nav('dashboard');
    setInterval(refreshBadges, 30000);
    refreshBadges();
  } catch(e) { err.textContent = 'Erro de conexão com o servidor'; err.style.display='block'; }
}

function logout() {
  localStorage.removeItem('mo_token');
  location.reload();
}

// Auto-login if token exists
async function tryAutoLogin() {
  if (!token) return;
  try {
    const r = await fetch(API+'/auth/me', {headers:{'Authorization':'Bearer '+token}});
    if (!r.ok) { localStorage.removeItem('mo_token'); return; }
    currentUser = await r.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('topbar-user').textContent = currentUser.name;
    nav('dashboard');
    setInterval(refreshBadges, 30000);
    refreshBadges();
  } catch(e) {}
}

async function refreshBadges() {
  const alerts = await api('GET', '/alerts?unread=1');
  const queue = await api('GET', '/queue');
  if (alerts) {
    const b = document.getElementById('alerts-badge');
    if (alerts.length > 0) { b.textContent = alerts.length; b.style.display=''; }
    else b.style.display='none';
  }
  if (queue) {
    const b = document.getElementById('queue-badge');
    if (queue.length > 0) { b.textContent = queue.length; b.style.display=''; }
    else b.style.display='none';
  }
}

// ── NAV ──────────────────────────────────────────────
const pageTitles = {dashboard:'Dashboard',queue:'Fila de Operações',clients:'Clientes',vessels:'Embarcações',spots:'Vagas',contracts:'Contratos',financial:'Financeiro',store:'Loja / PDV',maintenance:'Manutenção',analytics:'Analytics',alerts:'Alertas'};

function nav(page) {
  currentPage = page;
  document.getElementById('page-title').textContent = pageTitles[page]||page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page===page));
  Object.values(pageCharts).forEach(c => { try { c.destroy(); } catch(e){} });
  pageCharts = {};
  const c = document.getElementById('content');
  c.innerHTML = '<div class="spinner"></div>';
  pages[page]();
}

function refreshPage() { nav(currentPage); }

// ── HELPERS ──────────────────────────────────────────
const fmt = n => n == null ? '—' : new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n);
const fmtNum = n => n == null ? '—' : new Intl.NumberFormat('pt-BR').format(n);
const fmtDate = s => { if(!s) return '—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('pt-BR'); };
const fmtDT = s => { if(!s) return '—'; return new Date(s).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); };
const tierBadge = t => {
  if(t==='vip') return '<span class="tier-vip">VIP</span>';
  if(t==='gold') return '<span class="tier-gold">GOLD</span>';
  if(t==='silver') return '<span class="tier-silver">SILVER</span>';
  return '<span class="tier-standard">STD</span>';
};
const statusBadge = (s, map) => {
  const m = {
    active:'badge-success',paid:'badge-success',completed:'badge-success',available:'badge-success',
    waiting:'badge-warning',in_progress:'badge-info',open:'badge-info',pending:'badge-warning',
    overdue:'badge-danger',cancelled:'badge-gray',maintenance:'badge-warning',occupied:'badge-info',
    ...(map||{})
  };
  const labels = {active:'Ativo',paid:'Pago',completed:'Concluído',available:'Disponível',waiting:'Aguardando',
    in_progress:'Em andamento',open:'Aberto',pending:'Pendente',overdue:'Vencido',cancelled:'Cancelado',
    maintenance:'Manutenção',occupied:'Ocupado'};
  return `<span class="badge ${m[s]||'badge-gray'}">${labels[s]||s}</span>`;
};
const priorityBadge = p => {
  const m={urgent:'badge-danger',high:'badge-warning',normal:'badge-info',low:'badge-gray'};
  const l={urgent:'Urgente',high:'Alta',normal:'Normal',low:'Baixa'};
  return `<span class="badge ${m[p]||'badge-gray'}">${l[p]||p}</span>`;
};
const opBadge = t => {
  const m={descida:'badge-info',subida:'badge-success',atracacao:'badge-purple'};
  const l={descida:'⬇ Descida',subida:'⬆ Subida',atracacao:'⚓ Atracação'};
  return `<span class="badge ${m[t]||'badge-gray'}">${l[t]||t}</span>`;
};

function setContent(html) { document.getElementById('content').innerHTML = html; }

function modal(html) {
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="closeModal(event)">${html}</div>`;
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-root').innerHTML = '';
}
function closeModalForce() { document.getElementById('modal-root').innerHTML = ''; }

async function toast(msg, type='success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--${type==='error'?'danger':type==='warn'?'warning':'success'});border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;box-shadow:var(--shadow);color:var(--text);max-width:320px`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── NAVIGATION HELPERS ───────────────────────────────
function goToOrders(filter) {
  _storeTab = 'orders';
  window._ordersFilter = filter || 'all';
  nav('store');
}
function goToFinancial(status) {
  _finStatusFilter = status || '';
  nav('financial');
}

// ── PAGE: DASHBOARD ───────────────────────────────────
pages = {};

    <div class="kpi clickable" onclick="goToFinancial('')" title="Ver financeiro"><div class="kpi-label">Receita do Mês</div><div class="kpi-value" style="font-size:20px">${fmt(kpis.receita_mes)}</div><div class="kpi-sub">Loja: ${fmt(kpis.receita_loja)}</div><span class="kpi-icon">💰</span></div>
    <div class="kpi red clickable" onclick="goToFinancial('overdue')" title="Ver inadimplentes"><div class="kpi-label">Inadimplência</div><div class="kpi-value" style="font-size:20px">${fmt(kpis.inadimplencia)}</div><div class="kpi-sub">${kpis.taxa_inadimplencia}% da carteira</div><span class="kpi-icon">⚠️</span></div>

  </div>
  <div class="grid g4 mb-2">
    <div class="kpi purple clickable" onclick="nav('clients')" title="Ver clientes"><div class="kpi-label">Clientes Ativos</div><div class="kpi-value">${kpis.total_clientes}</div><div class="kpi-sub">${kpis.vip_count} VIP/Gold</div><span class="kpi-icon">👤</span></div>
    <div class="kpi clickable" onclick="nav('vessels')" title="Ver embarcações"><div class="kpi-label">Embarcações</div><div class="kpi-value">${kpis.total_vessels}</div><div class="kpi-sub">${kpis.contratos_ativos} contratos ativos</div><span class="kpi-icon">🛥️</span></div>
    <div class="kpi yellow clickable" onclick="nav('maintenance')" title="Ver manutenção"><div class="kpi-label">OS em Aberto</div><div class="kpi-value">${kpis.os_abertas}</div><div class="kpi-sub">${kpis.os_urgentes} urgentes</div><span class="kpi-icon">🔧</span></div>
    <div class="kpi clickable" onclick="nav('queue')" title="Ver fila de operações"><div class="kpi-label">SLA Médio (min)</div><div class="kpi-value">${kpis.sla_avg_min}</div><div class="kpi-sub">Tempo médio atendimento</div><span class="kpi-icon">⏱️</span></div>
  </div>
  <div class="grid g2 mb-2">
    <div class="card">
      <div class="card-header"><div class="card-title">Ocupação de Vagas</div><button class="btn btn-ghost btn-sm" onclick="nav('spots')">Ver Vagas →</button></div>
      <div class="mb-2" style="cursor:pointer" onclick="nav('spots')">
        <div class="flex justify-between text-xs mb-1"><span>Seca (${kpis.vagas_seca_ocupadas}/${kpis.vagas_seca_total})</span><span>${kpis.ocupacao_seca}%</span></div>
        <div class="progress-bar"><div class="progress-fill ${kpis.ocupacao_seca>85?'red':kpis.ocupacao_seca>60?'yellow':'green'}" style="width:${kpis.ocupacao_seca}%"></div></div>
      </div>
      <div style="cursor:pointer" onclick="nav('spots')">
        <div class="flex justify-between text-xs mb-1"><span>Molhada (${kpis.vagas_molhada_ocupadas}/${kpis.vagas_molhada_total})</span><span>${kpis.ocupacao_molhada}%</span></div>
        <div class="progress-bar"><div class="progress-fill ${kpis.ocupacao_molhada>85?'red':kpis.ocupacao_molhada>60?'yellow':'green'}" style="width:${kpis.ocupacao_molhada}%"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px">
        <div class="dash-spot-tile" onclick="nav('spots')" style="text-align:center;background:var(--surface2);border-radius:8px;padding:12px;border:1px solid transparent" title="Ver vagas disponíveis"><div style="font-size:20px;font-weight:700;color:var(--success)">${kpis.vagas_total - kpis.vagas_ocupadas}</div><div class="text-xs text-muted">Disponíveis</div></div>
        <div class="dash-spot-tile" onclick="nav('spots')" style="text-align:center;background:var(--surface2);border-radius:8px;padding:12px;border:1px solid transparent" title="Ver vagas ocupadas"><div style="font-size:20px;font-weight:700;color:var(--accent)">${kpis.vagas_ocupadas}</div><div class="text-xs text-muted">Ocupadas</div></div>
        <div class="dash-spot-tile" onclick="nav('spots')" style="text-align:center;background:var(--surface2);border-radius:8px;padding:12px;border:1px solid transparent" title="Ver todas as vagas"><div style="font-size:20px;font-weight:700;color:var(--text)">${kpis.vagas_total}</div><div class="text-xs text-muted">Total</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Receita Mensal</div><button class="btn btn-ghost btn-sm" onclick="goToFinancial('')">Ver Financeiro →</button></div>
      <canvas id="rev-chart" height="180" style="cursor:pointer" onclick="goToFinancial('')"></canvas>
    </div>
  </div>
  <div class="grid g2">
    <div class="card">
      <div class="card-header"><div class="card-title">Fila Ativa</div><button class="btn btn-ghost btn-sm" onclick="nav('queue')">Ver Tudo →</button></div>
      <div id="dash-queue">${queue && queue.length ? queue.slice(0,5).map(q=>`
        <div class="queue-card" style="cursor:pointer" onclick="nav('queue')" title="Ir para fila de operações">
          <div class="queue-priority ${q.priority?'high':'normal'}"></div>
          <div class="queue-info">
            <div class="queue-vessel">${q.vessel_name} ${tierBadge(q.client_tier)}</div>
            <div class="queue-detail">${opBadge(q.operation_type)} · ${q.client_name} · ${fmtDT(q.requested_at)}</div>
          </div>
          ${statusBadge(q.status)}
        </div>`).join('') : '<div class="empty-state"><div class="icon">✅</div><p>Fila vazia</p></div>'}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Top Clientes (LTV)</div><button class="btn btn-ghost btn-sm" onclick="nav('clients')">Ver Clientes →</button></div>

        <thead><tr><th>Cliente</th><th>Tier</th><th>LTV</th><th>Embarcações</th></tr></thead>
        <tbody>${(topClients||[]).slice(0,6).map(c=>`<tr class="row-link" onclick="nav('clients')" title="Ver clientes"><td>${c.name}</td><td>${tierBadge(c.tier)}</td><td class="text-success font-bold">${fmt(c.ltv)}</td><td>${c.vessels}</td></tr>`).join('')}</tbody>
      </table></div>

  if (rev && rev.length) {
    pageCharts.rev = new Chart(document.getElementById('rev-chart'), {
      type: 'bar',

        labels: rev.map(r => r.month),

      },
      options: {responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'R$'+fmtNum(v)},grid:{color:'rgba(42,58,85,.5)'}},x:{grid:{display:false}}}}

};

// ── PAGE: QUEUE ───────────────────────────────────────
pages.queue = async () => {
  const queue = await api('GET', '/queue');
  const vessels = await api('GET', '/vessels');
  setContent(`
  <div class="flex justify-between mb-2">
    <div class="tabs">
      <div class="tab active" onclick="filterQueue('active',this)">Ativa</div>
      <div class="tab" onclick="filterQueue('history',this)">Histórico</div>
    </div>
    <button class="btn btn-primary" onclick="openQueueModal(${JSON.stringify(vessels||[]).replace(/"/g,'&quot;')})">+ Nova Operação</button>
  </div>
  <div id="queue-list">${renderQueue(queue||[])}</div>`);
};

function renderQueue(queue) {
  if (!queue.length) return '<div class="empty-state"><div class="icon">📋</div><p>Sem operações na fila</p></div>';
  return queue.map(q => `
  <div class="queue-card" id="qcard-${q.id}">
    <div class="queue-priority ${q.priority?'high':'normal'}"></div>
    <div style="flex:1">
      <div class="flex items-center gap-2 mb-1">
        <span class="font-bold">${q.vessel_name}</span>
        ${tierBadge(q.client_tier)}
        ${opBadge(q.operation_type)}
        ${statusBadge(q.status)}
      </div>
      <div class="text-xs text-muted">
        ${q.client_name} · Solicitado: ${fmtDT(q.requested_at)}
        ${q.started_at ? ' · Iniciado: '+fmtDT(q.started_at) : ''}
        ${q.completed_at ? ' · Concluído: '+fmtDT(q.completed_at) : ''}
        ${q.operator ? ' · Op: '+q.operator : ''}
        ${q.notes ? ' · '+q.notes : ''}
      </div>
    </div>
    <div class="flex gap-2">
      ${q.status==='waiting' ? `<button class="btn btn-warning btn-sm" onclick="updateQueue(${q.id},'in_progress')">▶ Iniciar</button>` : ''}
      ${q.status==='in_progress' ? `<button class="btn btn-success btn-sm" onclick="updateQueue(${q.id},'completed')">✓ Concluir</button>` : ''}
      ${!['completed','cancelled'].includes(q.status) ? `<button class="btn btn-danger btn-sm" onclick="updateQueue(${q.id},'cancelled')">✕</button>` : ''}
    </div>
  </div>`).join('');
}

async function filterQueue(type, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  let data;
  if (type==='active') data = await api('GET','/queue');
  else data = await api('GET','/queue/history');
  document.getElementById('queue-list').innerHTML = renderQueue(data||[]);
}

async function updateQueue(id, status) {
  await api('PUT', `/queue/${id}`, {status});
  toast(`Operação ${status==='completed'?'concluída':status==='in_progress'?'iniciada':'cancelada'}`);
  pages.queue();
}

function openQueueModal(vessels) {
  modal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nova Operação na Fila</div>
    <div class="form-row cols2">
      <div class="form-group"><label>Embarcação</label>
        <select id="q-vessel">
          ${(typeof vessels==='string'?JSON.parse(vessels):vessels).map(v=>`<option value="${v.id}">${v.name} - ${v.client_name}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Operação</label>
        <select id="q-type"><option value="descida">⬇ Descida (seco → água)</option><option value="subida">⬆ Subida (água → seco)</option><option value="atracacao">⚓ Atracação</option></select>
      </div>
    </div>
    <div class="form-group"><label>Observações</label><input id="q-notes" placeholder="Opcional..."></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancelar</button>
      <button class="btn btn-primary" onclick="submitQueue()">Adicionar à Fila</button>
    </div>
  </div>`);
}

async function submitQueue() {
  const vessel_id = document.getElementById('q-vessel').value;
  const operation_type = document.getElementById('q-type').value;
  const notes = document.getElementById('q-notes').value;
  const r = await api('POST','/queue',{vessel_id:parseInt(vessel_id),operation_type,notes});
  if (r && r.id) { toast('Operação adicionada à fila'); closeModalForce(); pages.queue(); }
}

// ── PAGE: CLIENTS ─────────────────────────────────────
pages.clients = async () => {
  const clients = await api('GET', '/clients');
  setContent(`
  <div class="flex justify-between mb-2">
    <div class="search-bar">
      <input id="client-search" placeholder="Buscar por nome, e-mail, CPF..." oninput="searchClients()" style="max-width:280px">
      <select id="client-tier" onchange="searchClients()">
        <option value="">Todos os tiers</option>
        <option value="vip">VIP</option><option value="gold">Gold</option>
        <option value="silver">Silver</option><option value="standard">Standard</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="openClientModal()">+ Novo Cliente</button>
  </div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Cliente</th><th>Tier</th><th>Contato</th><th>Embarcações</th><th>LTV</th><th>Ações</th></tr></thead>
    <tbody id="clients-tbody">${renderClientsRows(clients||[])}</tbody>
  </table></div></div>`);
};

function renderClientsRows(clients) {
  if (!clients.length) return '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:32px">Nenhum cliente encontrado</td></tr>';
  return clients.map(c=>`<tr>
    <td><div class="font-bold">${c.name}</div><div class="text-xs text-muted">${c.cpf||'—'}</div></td>
    <td>${tierBadge(c.tier)}</td>
    <td><div>${c.email||'—'}</div><div class="text-xs text-muted">${c.phone||''}</div></td>
    <td>${c.vessel_count||0}</td>
    <td class="text-success font-bold">${fmt(c.ltv)}</td>
    <td><div class="flex gap-2">
      <button class="btn btn-ghost btn-sm" onclick="viewClient(${c.id})">👁 Ver</button>
      <button class="btn btn-ghost btn-sm" onclick="openClientModal(${c.id})">✏️</button>
    </div></td>
  </tr>`).join('');
}

async function searchClients() {
  const search = document.getElementById('client-search').value;
  const tier = document.getElementById('client-tier').value;
  const q = new URLSearchParams();
  if (search) q.set('search',search);
  if (tier) q.set('tier',tier);
  const data = await api('GET','/clients?'+q.toString());
  document.getElementById('clients-tbody').innerHTML = renderClientsRows(data||[]);
}

async function viewClient(id) {
  const c = await api('GET',`/clients/${id}`);
  modal(`<div class="modal modal-lg" onclick="event.stopPropagation()">
    <div class="modal-title">👤 ${c.name} ${tierBadge(c.tier)}</div>
    <div class="grid g2 mb-2">
      <div class="card"><b>E-mail:</b> ${c.email||'—'}<br><b>Fone:</b> ${c.phone||'—'}<br><b>CPF:</b> ${c.cpf||'—'}<br><b>Endereço:</b> ${c.address||'—'}</div>
      <div class="card"><b>LTV:</b> <span class="text-success font-bold">${fmt(c.ltv)}</span><br><b>Embarcações:</b> ${c.vessel_count||0}<br><b>Contratos:</b> ${(c.contracts||[]).length}<br><b>Desde:</b> ${fmtDate(c.created_at)}</div>
    </div>

pages.financial = async () => {
  const summary  = await api('GET','/financial/summary');

  if (_finExpandMonths[`${curYear}-${curMonth}`] === undefined) _finExpandMonths[`${curYear}-${curMonth}`] = true;
  _finStatusFilter = _finStatusFilter || '';

  const cnt = {
    all:     _allCharges.length,
    pending: _allCharges.filter(c=>c.status==='pending').length,
    overdue: _allCharges.filter(c=>c.status==='overdue').length,
    paid:    _allCharges.filter(c=>c.status==='paid').length
  };
  const tot = {
    pending: _allCharges.filter(c=>c.status==='pending').reduce((s,c)=>s+c.amount,0),
    overdue: _allCharges.filter(c=>c.status==='overdue').reduce((s,c)=>s+c.amount,0),
    paid:    _allCharges.filter(c=>c.status==='paid').reduce((s,c)=>s+c.amount,0)
  };
  const totalGeral = tot.paid + tot.pending + tot.overdue;

  setContent(`
  <div class="grid g4 mb-2">
    <div class="kpi green"><div class="kpi-label">Receita do Mês</div><div class="kpi-value" style="font-size:20px">${fmt(summary.total_paid_month)}</div><span class="kpi-icon">💰</span></div>

    <div class="kpi red"><div class="kpi-label">Inadimplência</div><div class="kpi-value" style="font-size:20px">${fmt(summary.total_overdue)}</div><div class="kpi-sub">${summary.count_overdue} cobranças</div><span class="kpi-icon">⚠️</span></div>
    <div class="kpi purple"><div class="kpi-label">Total Geral</div><div class="kpi-value" style="font-size:20px">${fmt(totalGeral)}</div><div class="kpi-sub">${cnt.all} cobranças</div><span class="kpi-icon">📊</span></div>
  </div>

  <div class="flex justify-between items-center" style="gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <div class="fin-status-tabs">
      <button class="fin-status-tab${_finStatusFilter===''?' active':''}" onclick="setFinStatus('',this)">
        Todas <span class="tab-count tab-count-all">${cnt.all}</span>
      </button>
      <button class="fin-status-tab${_finStatusFilter==='pending'?' active':''}" onclick="setFinStatus('pending',this)">
        🕐 Pendentes <span class="tab-count tab-count-pending">${cnt.pending}</span>
        <span style="font-size:11px;color:var(--text3)">${fmt(tot.pending)}</span>
      </button>
      <button class="fin-status-tab${_finStatusFilter==='overdue'?' active':''}" onclick="setFinStatus('overdue',this)">
        🔴 Vencidas <span class="tab-count tab-count-overdue">${cnt.overdue}</span>
        <span style="font-size:11px;color:var(--text3)">${fmt(tot.overdue)}</span>
      </button>

        ✅ Pagas <span class="tab-count tab-count-paid">${cnt.paid}</span>

  </div>

  <div id="fin-tree"></div>`);

  renderFinTree();
};

function calcFinTotals(arr) {
  return {
    paid:    arr.filter(c=>c.status==='paid').reduce((s,c)=>s+c.amount,0),
    pending: arr.filter(c=>c.status==='pending').reduce((s,c)=>s+c.amount,0),
    overdue: arr.filter(c=>c.status==='overdue').reduce((s,c)=>s+c.amount,0),
    total:   arr.reduce((s,c)=>s+c.amount,0),
    count:   arr.length
  };
}

function renderFinTree() {
  const filtered = _finStatusFilter ? _allCharges.filter(c=>c.status===_finStatusFilter) : _allCharges;

  // Group: year → month → charges
  const byYear = {};
  filtered.forEach(c => {
    const d = c.due_date || '';
    const y = d.slice(0,4) || '?';
    const m = d.slice(5,7) || '?';
    if (!byYear[y]) byYear[y] = {};
    if (!byYear[y][m]) byYear[y][m] = [];
    byYear[y][m].push(c);
  });

  const curYear = new Date().getFullYear().toString();
  const years   = Object.keys(byYear).sort((a,b)=>Number(b)-Number(a));

  if (!years.length) {
    document.getElementById('fin-tree').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhuma cobrança encontrada para este filtro</p></div>';
    return;
  }

  let html = '';
  years.forEach(year => {
    const isCur   = year === curYear;
    const exp     = _finExpandYears[year] !== false && (isCur || !!_finExpandYears[year]);
    const allArr  = Object.values(byYear[year]).flat();
    const yt      = calcFinTotals(allArr);

    let stats = '';
    if (yt.paid    > 0) stats += `<span class="fin-stat green">💰 ${fmt(yt.paid)}</span>`;
    if (yt.pending > 0) stats += `<span class="fin-stat yellow">🕐 ${fmt(yt.pending)}</span>`;
    if (yt.overdue > 0) stats += `<span class="fin-stat red">🔴 ${fmt(yt.overdue)}</span>`;
    stats += `<span class="fin-stat total">${yt.count} cobranças · ${fmt(yt.total)}</span>`;

    html += `
    <div class="fin-year">
      <div class="fin-year-header" onclick="toggleFinYear('${year}')">
        <span class="fin-expand">${exp?'▼':'▶'}</span>
        <span class="fin-year-title">${year}${isCur?' <span class="badge badge-info" style="font-size:10px;margin-left:6px">Ano Atual</span>':''}</span>
        <div class="fin-year-stats">${stats}</div>
      </div>
      <div id="fin-y-${year}" class="fin-year-body" style="display:${exp?'block':'none'}">
        ${renderFinMonths(byYear[year], year)}
      </div>
    </div>`;
  });

  document.getElementById('fin-tree').innerHTML = html;
}

function renderFinMonths(monthsObj, year) {
  const months   = Object.keys(monthsObj).sort((a,b)=>Number(b)-Number(a));
  const curYear  = new Date().getFullYear().toString();
  const curMonth = String(new Date().getMonth()+1).padStart(2,'0');
  let html = '';

  months.forEach(month => {
    const key = `${year}-${month}`;
    const arr = monthsObj[month];
    const exp = _finExpandMonths[key] !== false && (year===curYear && month===curMonth || !!_finExpandMonths[key]);
    const mt  = calcFinTotals(arr);

    let mStats = `<span style="font-size:11px;color:var(--text3)">${mt.count} cobranças</span>`;
    if (mt.paid    > 0) mStats += `<span class="badge badge-success" style="font-size:11px">${fmt(mt.paid)}</span>`;
    if (mt.pending > 0) mStats += `<span class="badge badge-warning" style="font-size:11px">${fmt(mt.pending)}</span>`;
    if (mt.overdue > 0) mStats += `<span class="badge badge-danger"  style="font-size:11px">${fmt(mt.overdue)}</span>`;

    html += `
    <div class="fin-month">
      <div class="fin-month-header" onclick="toggleFinMonth('${key}')">
        <span class="fin-expand">${exp?'▼':'▶'}</span>
        <span class="fin-month-title">📅 ${MONTH_PT[parseInt(month)]||month} ${year}</span>
        <div class="fin-month-stats">${mStats}</div>
      </div>
      <div id="fin-m-${key}" style="display:${exp?'block':'none'}">
        <div class="card" style="margin-top:6px;padding:0;overflow:hidden">
          <div class="table-wrap"><table>
            <thead><tr><th>Cliente</th><th>Descrição</th><th>Valor</th><th>Vencimento</th><th>Pagamento</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>${renderChargeRows(arr)}</tbody>
          </table></div>
        </div>
      </div>
    </div>`;
  });

  return html;
}

function renderChargeRows(charges) {
  if (!charges||!charges.length) return '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:20px">Sem cobranças</td></tr>';
  return charges.map(c=>`<tr>
    <td>${c.client_name} ${tierBadge(c.client_tier)}</td>
    <td>${c.description}</td>
    <td class="font-bold">${fmt(c.amount)}</td>
    <td>${fmtDate(c.due_date)}</td>
    <td>${c.paid_date?fmtDate(c.paid_date):'—'} ${c.payment_method?'<span class="badge badge-gray">'+c.payment_method+'</span>':''}</td>
    <td>${statusBadge(c.status)}</td>

      ${c.status!=='paid'?`<button class="btn btn-success btn-sm" onclick="markPaid(${c.id})">✓ Pago</button>`:''}
    </div></td>
  </tr>`).join('');
}

function addToCart(id, name, price, stock) {
  const existing = cart.find(i=>i.item_id===id);
  if (existing) {
    if (existing.qty < stock) existing.qty++;
    else { toast('Estoque insuficiente','error'); return; }
  } else {
    cart.push({item_id:id,name,price,qty:1});
  }
  renderCartItems();
}

function renderCartItems() {
  const el = document.getElementById('cart-items');
  const total = document.getElementById('cart-total-val');
  if (!el) return;
  if (!cart.length) { el.innerHTML = '<div class="empty-state" style="padding:30px"><div class="icon">🛒</div><p>Carrinho vazio</p></div>'; }
  else {
    el.innerHTML = cart.map((item,i)=>`
    <div class="cart-item">
      <div style="flex:1"><div class="font-bold text-sm">${item.name}</div><div class="text-xs text-muted">${fmt(item.price)} × ${item.qty}</div></div>
      <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-sm" onclick="cartQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button class="btn btn-ghost btn-sm" onclick="cartQty(${i},1)">+</button>
        <span class="text-success font-bold" style="min-width:70px;text-align:right">${fmt(item.price*item.qty)}</span>
      </div>
    </div>`).join('');
  }
  const t = cart.reduce((s,i)=>s+i.price*i.qty,0);
  if (total) total.textContent = fmt(t);
}

function cartQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx,1);
  renderCartItems();
}

async function finalizeSale() {
  if (!cart.length) { toast('Carrinho vazio','error'); return; }
  const payment = document.getElementById('pdv-payment').value;

  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  if (payment==='pix') {
    const pix = await api('POST','/store/pix-qrcode',{amount:total});
    const pixPayload = (pix && pix.payload) ? pix.payload : '';
    const qrImgUrl = pixPayload ? `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pixPayload)}` : '';
    modal(`<div class="modal" onclick="event.stopPropagation()">

      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px">
        <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px" onclick="closeModalForce();confirmSale()">💳 Cobrar Aqui (PIX)</button>
        <button class="btn btn-success" style="width:100%;padding:12px;font-size:14px" onclick="closeModalForce();sendWhatsApp(${JSON.stringify(pixPayload)},${JSON.stringify(qrImgUrl)})">📲 Enviar via WhatsApp</button>

      </div>

async function sendWhatsApp(pixPayload, qrImgUrl) {
  const client_id = document.getElementById('pdv-client')?.value;
  const vessel_id = document.getElementById('pdv-vessel')?.value;
  const payment = 'pix';
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  // Create order with pending_payment status
  const r = await api('POST','/store/orders',{items:cart,client_id:client_id?parseInt(client_id):null,vessel_id:vessel_id?parseInt(vessel_id):null,payment_method:payment,status:'pending_payment'});
  if (!r || !r.id) { toast('Erro ao criar pedido','error'); return; }
  // Get client phone
  let phone = '';
  if (client_id) {
    const clients = await api('GET','/clients');
    const cl = (clients||[]).find(c=>String(c.id)===String(client_id));
    if (cl && cl.phone) phone = cl.phone.replace(/\D/g,'');
  }
  // Build WhatsApp message
  const itemsList = cart.map(i=>`• ${i.name} x${i.qty} = ${fmt(i.price*i.qty)}`).join('\n');
  let msg = `*Pedido Marina One — #${r.id}*\n\n${itemsList}\n\n*Total: ${fmt(total)}*\n\nPague via PIX:\n\`${pixPayload}\``;
  if (qrImgUrl) msg += `\n\nQR Code: ${qrImgUrl}`;
  const waUrl = phone
    ? `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`
    : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(waUrl,'_blank');
  toast(`Pedido #${r.id} criado! WhatsApp aberto.`);
  cart=[]; pages.store();
}

async function confirmSale() {
  const payment = document.getElementById('pdv-payment')?.value || 'dinheiro';
  const client_id = document.getElementById('pdv-client')?.value;
  const vessel_id = document.getElementById('pdv-vessel')?.value;
  const r = await api('POST','/store/orders',{items:cart,client_id:client_id?parseInt(client_id):null,vessel_id:vessel_id?parseInt(vessel_id):null,payment_method:payment,status:'paid'});
  if (r && r.id) { toast(`Venda finalizada! Total: ${fmt(r.total)}`); cart=[]; pages.store(); }
}

// ── PAGE: ALERTS ──────────────────────────────────────
pages.alerts = async () => {
  const alerts = await api('GET','/alerts');
  setContent(`
  <div class="flex justify-between mb-2">
    <span class="text-sm text-muted">${alerts.filter(a=>!a.read_at).length} alertas não lidos</span>
    <button class="btn btn-ghost btn-sm" onclick="markAllRead()">✓ Marcar todos como lidos</button>
  </div>
  <div id="alerts-list">${renderAlerts(alerts||[])}</div>`);
};

function renderAlerts(alerts) {
  if (!alerts.length) return '<div class="empty-state"><div class="icon">🔔</div><p>Nenhum alerta</p></div>';
  return alerts.map(a=>`
  <div class="alert-item ${a.severity}" style="${a.read_at?'opacity:.5':''}">
    <div class="alert-icon">${{info:'ℹ️',warning:'⚠️',error:'🚨'}[a.severity]||'🔔'}</div>
    <div class="alert-content">
      <div class="alert-msg">${a.message}</div>
      <div class="alert-meta">${fmtDT(a.created_at)} · ${a.type}${a.read_at?' · Lido':''}</div>
    </div>
    ${!a.read_at?`<button class="btn btn-ghost btn-sm" onclick="markRead(${a.id})">✓ Ler</button>`:''}
  </div>`).join('');
}

async function markRead(id) {
  await api('PUT',`/alerts/${id}/read`);
  refreshBadges(); pages.alerts();
}

async function markAllRead() {
  await api('PUT','/alerts/read-all');
  toast('Todos os alertas marcados como lidos'); refreshBadges(); pages.alerts();
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModalForce();
});
